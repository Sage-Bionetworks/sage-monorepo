services:
  qtl-api-docs:
    image: ghcr.io/sage-bionetworks/qtl-api-docs:${QTL_VERSION:-local}
    container_name: qtl-api-docs
    restart: always
    env_file:
      - ../../../apps/qtl/api-docs/.env
    networks:
      - qtl
    ports:
      - '8010:8010'
    deploy:
      resources:
        limits:
          memory: 200M

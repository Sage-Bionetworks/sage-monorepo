        <h1>Model AD Explorer — Next-generation models of Alzheimer's Disease</h1>
        <p>
          The <strong>Model AD Explorer</strong> is a publicly accessible scentific application
          developed and maintained by <strong>Sage Bionetworks</strong>, a 501(c)(3) nonprofit
          biomedical research organization, with funding from the National Institute on Aging (NIA).
          The Model AD Explorer is part of the broader
          <strong>AD Knowledge Portal</strong> ecosystem at
          <a href="https://adknowledgeportal.org">adknowledgeportal.org</a>.
        </p>
        <h2>About the Model AD Explorer</h2>
        <p>
          The Model AD Explorer hosts summaries of phenotypic data for in vivo models of Alzheimer's
          Disease (AD) to enable researchers to select the most appropriate model to use for their
          research. The Model AD Explorer was initially developed with support of the NIA's Model
          Organism Development and Evaluation for Late-onset Alzheimer’s Disease (MODEL-AD)
          Consortium.
        </p>
        <h2>About the AD Knowledge Portal</h2>
        <p>
          The AD Knowledge Portal (adknowledgeportal.org) is an open-access database developed by
          Sage Bionetworks that disseminates data, tools, and analytical results generated by
          multiple National Institute on Aging-funded programs focused on aging, dementia, and
          Alzheimer's disease. The portal hosts data and resources generated across 100+ grant
          projects in 10+ NIA-supported programs and centers, including multi-omic data from human
          samples and experimental model systems.
        </p>
        <p>
          The portal was developed as part of the Accelerating Medicines Partnership in Alzheimer's
          Disease (AMP-AD) program between the NIH and several nonprofit organizations and
          pharmaceutical companies, and has since expanded to include data from additional
          NIA-funded consortia.
        </p>
        <h2>What You Can Do on the Model AD Explorer</h2>
        <ul>
          <li>Explore detailed phenotypic characterization results for 15+ AD mouse models.</li>
          <li>
            Compare genome-wide differential RNA expression results for the available mouse models.
          </li>
          <li>
            See how changes in mouse model gene expression correlate with changes in gene expression
            in human AD patients.
          </li>
          <li>View pathology and biomarker evidence for the available mouse models.</li>
          <li>Search for mouse models by name, JAX ID, RRID, or by modified gene.</li>
          <li>Find results for additional mouse models as they become available.</li>
          <li>
            See results for other AD model organisms developed by the NIA-funded Marmo-AD and MPS-AD
            consortia as they become available.
          </li>
        </ul>

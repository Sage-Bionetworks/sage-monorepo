# Base configuration for BioArena App
# Default values can be overridden by:
# 1. Profile-specific files (e.g., application-dev.yaml)
# 2. Environment variables (e.g., APP_VERSION, API_BASE_URLS_CSR, ANALYTICS_GOOGLE_TAG_MANAGER_ID)

app:
  version: local

api:
  baseUrls:
    csr: http://127.0.0.1:8000/api/v1
    ssr: http://bixarena-api-gateway:8113/api/v1

auth:
  baseUrls:
    csr: http://127.0.0.1:8000

battle:
  promptLengthLimit: 5000
  roundLimit: 20
  promptUseLimit: 5

analytics:
  googleTagManager:
    enabled: true
    id: ''

links:
  termsOfService: https://sagebionetworks.org/trust-center
  contact: https://sagebionetworks.org/contact
  feedback: https://forms.gle/WsvSdEfv5MfFpeedA
  sageBionetworks: https://sagebionetworks.org

environment: dev

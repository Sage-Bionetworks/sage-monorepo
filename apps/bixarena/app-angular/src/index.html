<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>BioArena</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/svg+xml" href="assets/bioarena-logo.svg" />
    <script>
      (function () {
        var stored = localStorage.getItem('ba-t');
        var dark =
          stored !== null
            ? stored === 'dark'
            : window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>

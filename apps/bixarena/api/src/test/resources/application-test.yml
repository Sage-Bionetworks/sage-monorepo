spring:
  cache:
    type: none # Disable caching for tests
  data:
    redis:
      repositories:
        enabled: false # Disable Redis repositories for tests
  datasource:
    url: jdbc:h2:mem:testdb;MODE=PostgreSQL;DATABASE_TO_UPPER=FALSE;INIT=CREATE SCHEMA IF NOT EXISTS api\;CREATE SCHEMA IF NOT EXISTS auth
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: false
    properties:
      hibernate:
        search:
          enabled: false # Disable Hibernate Search for tests
  flyway:
    enabled: false # Disable Flyway for simple tests

logging:
  level:
    org.sagebionetworks.bixarena: DEBUG

# Application properties required for configuration binding during tests
app:
  welcome-message: 'Welcome to BixArena API (test)'
  auth-service:
    base-url: 'http://localhost:8115'
    service-client-id: 'test-client-id'
    service-client-secret: 'test-client-secret'
  ai-service:
    base-url: 'http://localhost:8116'
  jwt:
    expected-issuer: 'urn:bixarena:auth:test'
    expected-audience: 'urn:bixarena:api:test'
  cors:
    allowed-origins:
      - 'http://localhost:3000'
    allowed-methods:
      - 'GET'
      - 'POST'
      - 'PUT'
      - 'DELETE'
    allowed-headers:
      - '*'
    allow-credentials: true

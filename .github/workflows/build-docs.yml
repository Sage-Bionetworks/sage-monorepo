# Reusable workflow: Validates MkDocs documentation build.
# Called by build-deploy-docs.yml for PR validation.

name: Build Docs

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: 3.x

      - name: Set up MkDocs cache
        run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV

      - name: Restore MkDocs cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-

      - name: Install MkDocs dependencies
        run: pip install mkdocs-material mkdocstrings mkdocstrings-python termynal mdx-truly-sane-lists

      - name: Build docs
        run: mkdocs build --strict

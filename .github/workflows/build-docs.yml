# Reusable workflow: Validates MkDocs documentation build.
# Called by build-deploy-docs.yml for PR validation.

name: Build Docs

on:
  workflow_call:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@7f4fc3e22c37d6ff65e88745f38bd3157c663f7c # v4.9.1
        with:
          python-version: 3.x

      - name: Set up MkDocs cache
        run: echo "cache_id=$(date --utc '+%V')" >> $GITHUB_ENV

      - name: Restore MkDocs cache
        uses: actions/cache@6f8efc29b200d32929f49075959781ed54ec270c # v3.5.0
        with:
          key: mkdocs-material-${{ env.cache_id }}
          path: .cache
          restore-keys: |
            mkdocs-material-

      - name: Install MkDocs dependencies
        run: pip install mkdocs-material mkdocstrings mkdocstrings-python termynal mdx-truly-sane-lists

      - name: Build docs
        run: mkdocs build --strict

<p-dialog
  [(visible)]="visible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [dismissableMask]="dismissableMask()"
  [closable]="closable()"
  [showHeader]="false"
  [styleClass]="'bixarena-modal ' + styleClass()"
  [appendTo]="'body'"
  transitionOptions="300ms cubic-bezier(0.25, 0.46, 0.45, 0.94)"
>
  <ng-content />
</p-dialog>

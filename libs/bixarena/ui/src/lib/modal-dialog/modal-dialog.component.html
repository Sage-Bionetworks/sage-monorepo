<p-dialog
  [(visible)]="visible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [dismissableMask]="dismissableMask()"
  [closable]="false"
  [showHeader]="false"
  [styleClass]="'bixarena-modal ' + styleClass()"
  [appendTo]="'body'"
  transitionOptions="300ms cubic-bezier(0.25, 0.46, 0.45, 0.94)"
>
  @if (closable()) {
    <button class="close-btn" (click)="onClose()" aria-label="Close">&times;</button>
  }
  @if (heading()) {
    <h2 class="heading">{{ heading() }}</h2>
  }
  <ng-content />
</p-dialog>

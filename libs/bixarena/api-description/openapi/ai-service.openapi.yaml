openapi: 3.0.3
info:
  version: 1.0.0
  title: BixArena AI Service
  description: Advance bioinformatics by evaluating and ranking AI agents.
  license:
    name: Apache 2.0
    url: https://github.com/Sage-Bionetworks/sage-monorepo/blob/main/LICENSE.txt
  contact:
    name: Support
    url: https://github.com/Sage-Bionetworks/sage-monorepo
servers:
  - url: http://localhost
security:
  - jwtBearer: []
tags:
  - name: Health Check
    description: Operations about health checks
    x-sage-internal: true
  - name: Prompt Validation
    description: Operations for validating biomedical prompts
    x-sage-internal: true
  - name: Battle Validation
    description: Operations for validating biomedical battles
    x-sage-internal: true
  - name: Prompt Categorization
    description: Operations for classifying a single prompt into biomedical categories
    x-sage-internal: true
  - name: Battle Categorization
    description: Operations for classifying a battle conversation into biomedical categories
    x-sage-internal: true
  - name: Chat
    description: Operations for streaming chat completions from LLM models
    x-sage-internal: true
paths:
  /health-check:
    get:
      x-anonymous-access: true
      x-sage-internal: true
      tags:
        - Health Check
      summary: Get health check information
      description: Get information about the health of the service
      operationId: getHealthCheck
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheck'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /validate-prompt:
    post:
      x-rate-limit-requests-per-minute: 60
      x-sage-internal: true
      tags:
        - Prompt Validation
      summary: Validate biomedical prompt
      description: Validates whether a prompt is biomedically related and returns a confidence score (requires authentication)
      operationId: validatePrompt
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromptValidationRequest'
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptValidation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /validate-battle:
    post:
      x-rate-limit-requests-per-minute: 60
      x-sage-internal: true
      tags:
        - Battle Validation
      summary: Validate biomedical battle
      description: Validates whether a battle's conversation (all user prompts) is biomedically related. Returns a confidence score. Requires authentication.
      operationId: validateBattle
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BattleValidationRequest'
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BattleValidation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /categorize-prompt:
    post:
      x-rate-limit-requests-per-minute: 60
      x-sage-internal: true
      tags:
        - Prompt Categorization
      summary: Categorize a prompt
      description: Classifies a single prompt into up to 3 biomedical subject categories using an LLM. The categories array may be empty when the classifier did not assign any category. Requires authentication.
      operationId: categorizePrompt
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PromptCategorizationRequest'
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PromptCategorization'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /categorize-battle:
    post:
      x-rate-limit-requests-per-minute: 60
      x-sage-internal: true
      tags:
        - Battle Categorization
      summary: Categorize a battle
      description: Classifies the prompts of a battle conversation into up to 3 biomedical subject categories using an LLM. The categories array may be empty when the classifier did not assign any category. Requires authentication.
      operationId: categorizeBattle
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BattleCategorizationRequest'
        required: true
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BattleCategorization'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /chat/completions:
    post:
      x-rate-limit-requests-per-minute: 60
      tags:
        - Chat
      summary: Create a chat completion
      description: Sends messages to an LLM model via OpenRouter and returns a streaming HTTP response (text/event-stream)
      operationId: createChatCompletion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelChatRequest'
      responses:
        '200':
          description: Streaming HTTP response with chat completion chunks
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ModelChatCompletionChunk'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  schemas:
    HealthCheck:
      type: object
      description: Represents the health of a service
      properties:
        status:
          description: Indicates whether the service status is acceptable or not
          type: string
          enum:
            - pass
            - fail
            - warn
      required:
        - status
    BasicError:
      type: object
      description: Problem details (tools.ietf.org/html/rfc7807)
      properties:
        title:
          type: string
          description: A human readable documentation for the problem type
        status:
          type: integer
          description: The HTTP status code
        detail:
          type: string
          description: A human readable explanation specific to this occurrence of the problem
        type:
          type: string
          description: An absolute URI that identifies the problem type
        instance:
          type: string
          description: An absolute URI that identifies the specific occurrence of the problem
      required:
        - title
        - status
    PromptValidationRequest:
      type: object
      description: The prompt text to validate for biomedical relevance.
      properties:
        prompt:
          type: string
          minLength: 1
          maxLength: 10000
          description: The prompt text to validate
      required:
        - prompt
    PromptValidation:
      type: object
      properties:
        prompt:
          type: string
          description: The original prompt that was validated
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Confidence score indicating biomedical relevance (0.0 = not biomedical, 1.0 = definitely biomedical)
        isBiomedical:
          type: boolean
          description: Whether the prompt is considered biomedically related based on the confidence score
        method:
          type: string
          maxLength: 100
          description: The validation method used (e.g. 'openrouter-haiku-v1')
      required:
        - prompt
        - confidence
        - isBiomedical
        - method
    BattleValidationRequest:
      type: object
      description: The prompts from a battle to validate for biomedical relevance.
      properties:
        prompts:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 10000
          minItems: 1
          maxItems: 20
          description: List of user prompts from all rounds of the battle
      required:
        - prompts
    BattleValidation:
      type: object
      properties:
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Confidence score indicating biomedical relevance (0.0 = not biomedical, 1.0 = definitely biomedical)
        isBiomedical:
          type: boolean
          description: Whether the battle conversation is considered biomedically related based on the confidence score
        method:
          type: string
          maxLength: 100
          description: The validation method used (e.g. 'openrouter-haiku-v1')
      required:
        - confidence
        - isBiomedical
        - method
    PromptCategorizationRequest:
      type: object
      description: The prompt text to categorize into biomedical subject categories.
      properties:
        prompt:
          type: string
          minLength: 1
          maxLength: 10000
          description: The prompt text to categorize
      required:
        - prompt
    PromptCategorization:
      type: object
      properties:
        prompt:
          type: string
          description: The original prompt that was categorized
        category:
          type: string
          maxLength: 100
          nullable: true
          description: Biomedical subject category slug assigned by the classifier. Null when the classifier could not assign any category.
        method:
          type: string
          maxLength: 100
          description: The categorization method used (e.g. 'openrouter-haiku-v1')
      required:
        - prompt
        - category
        - method
    BattleCategorizationRequest:
      type: object
      description: The prompts from a battle to categorize into biomedical subject categories.
      properties:
        prompts:
          type: array
          items:
            type: string
            minLength: 1
            maxLength: 10000
          minItems: 1
          maxItems: 20
          description: List of user prompts from all rounds of the battle
      required:
        - prompts
    BattleCategorization:
      type: object
      properties:
        categories:
          type: array
          items:
            type: string
            maxLength: 100
          minItems: 0
          maxItems: 3
          description: Up to three biomedical subject category slugs assigned by the classifier. May be empty when the classifier did not assign any category.
        method:
          type: string
          maxLength: 100
          description: The categorization method used (e.g. 'openrouter-haiku-v1')
      required:
        - categories
        - method
    ModelId:
      description: UUID of an AI model.
      type: string
      format: uuid
      example: 1a2b3c4d-5e6f-7a8b-9c0d-1e2f3a4b5c6d
    MessageRole:
      type: string
      description: The role of a message.
      maxLength: 20
      enum:
        - system
        - user
        - assistant
      example: user
    MessageContent:
      type: string
      description: The content of a message.
      maxLength: 10000
      example: What is the capital of France?
    MessageCreate:
      type: object
      description: Payload used to create a message.
      properties:
        role:
          $ref: '#/components/schemas/MessageRole'
        content:
          $ref: '#/components/schemas/MessageContent'
      required:
        - role
        - content
    ModelChatRequest:
      type: object
      description: Request payload for creating a chat completion
      properties:
        modelId:
          $ref: '#/components/schemas/ModelId'
        apiModelName:
          type: string
          description: The model name used for API calls.
          example: anthropic/claude-sonnet-4.5
        apiBase:
          type: string
          description: Base URL for the model API.
          example: https://openrouter.ai/api/v1
        messages:
          type: array
          items:
            $ref: '#/components/schemas/MessageCreate'
          description: The conversation messages to send to the model
      required:
        - modelId
        - apiModelName
        - apiBase
        - messages
    ModelErrorMessage:
      type: string
      description: Error message describing what went wrong.
      minLength: 1
      maxLength: 1000
      example: Rate limit exceeded
    ModelChatUsage:
      type: object
      description: Token usage and generation parameters for the chat completion
      properties:
        model:
          type: string
          description: The model identifier that was used
        temperature:
          type: number
          format: float
          description: The sampling temperature that was used
        topP:
          type: number
          format: float
          description: The nucleus sampling parameter that was used
        maxTokens:
          type: integer
          description: The maximum token limit that was set
        promptTokens:
          type: integer
          description: Number of tokens in the prompt
        completionTokens:
          type: integer
          description: Number of tokens in the completion
        totalTokens:
          type: integer
          description: Total number of tokens used
      required:
        - promptTokens
        - completionTokens
        - totalTokens
    ModelChatCompletionChunk:
      type: object
      description: A streaming event chunk from the model chat completion
      properties:
        content:
          $ref: '#/components/schemas/MessageContent'
        status:
          type: string
          enum:
            - streaming
            - complete
            - error
          description: Current state of the streaming response
        finishReason:
          type: string
          nullable: true
          enum:
            - stop
            - length
            - content_filter
            - error
          description: Reason the model stopped generating
        errorMessage:
          $ref: '#/components/schemas/ModelErrorMessage'
        usage:
          $ref: '#/components/schemas/ModelChatUsage'
      required:
        - status
    RateLimitError:
      allOf:
        - $ref: '#/components/schemas/BasicError'
        - type: object
          properties:
            limit:
              type: integer
              description: Maximum requests allowed per window
              example: 100
            window:
              type: string
              description: Time window for rate limiting
              example: 1 minute
            retryAfterSeconds:
              type: integer
              description: Seconds to wait before retrying
              example: 18
          required:
            - limit
            - window
            - retryAfterSeconds
  responses:
    NotFound:
      description: The specified resource was not found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/BasicError'
    InternalServerError:
      description: The request cannot be fulfilled due to an unexpected server error
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/BasicError'
    BadRequest:
      description: Invalid request
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/BasicError'
    Unauthorized:
      description: Unauthorized
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/BasicError'
    TooManyRequests:
      description: Too many requests. Rate limit exceeded. The client should wait before making additional requests.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RateLimitError'
      headers:
        Retry-After:
          description: Seconds to wait before making a new request
          schema:
            type: integer
            example: 18
        X-RateLimit-Limit:
          description: Maximum requests allowed per minute
          schema:
            type: integer
            example: 100
        X-RateLimit-Remaining:
          description: Remaining requests in current window
          schema:
            type: integer
            example: 0
        X-RateLimit-Reset:
          description: Seconds until rate limit window resets
          schema:
            type: integer
            example: 18
x-oauth2-audience: urn:bixarena:ai

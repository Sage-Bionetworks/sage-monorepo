openapi: 3.0.3
info:
  version: 1.0.0
  title: BixArena API
  description: Advance bioinformatics by evaluating and ranking AI agents.
  license:
    name: Apache 2.0
    url: https://github.com/Sage-Bionetworks/sage-monorepo/blob/main/LICENSE.txt
  contact:
    name: Support
    url: https://github.com/Sage-Bionetworks/sage-monorepo
servers:
  - url: https://bixarena.ai/api/v1
  - url: https://bixarena.ai/api/v1
tags:
  - name: Chat
    x-displayName: Chat
  - name: Admin
    description: Administrative endpoints requiring elevated roles.
    x-displayName: Admin
  - name: Battle
    description: Operations about battles between AI models.
    x-displayName: Battle
  - name: Example Prompt
    description: Operations about example prompts for biomedical relevance detection.
    x-displayName: Example Prompt
  - name: Leaderboard
    description: Operations about leaderboards.
    x-displayName: Leaderboard
  - name: Model
    description: Operations about models.
    x-displayName: Model
  - name: Quest
    description: Operations about community quests.
    x-displayName: Quest
  - name: Stats
    description: Public statistics about the platform.
    x-displayName: Stats
  - name: User
    description: Operations about the authenticated user.
    x-displayName: User
  - name: Auth
    description: Authentication and token minting operations.
    x-displayName: Auth
paths:
  /chat/completions:
    post:
      x-rate-limit-requests-per-minute: 60
      tags:
        - Chat
      summary: Create a chat completion
      description: Sends messages to an LLM model via OpenRouter and returns a streaming HTTP response (text/event-stream)
      operationId: createChatCompletion
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelChatRequest'
      responses:
        '200':
          description: Streaming HTTP response with chat completion chunks
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ModelChatCompletionChunk'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - jwtBearer: []
  /admin/quests/{questId}:
    parameters:
      - $ref: '#/components/parameters/questId'
    get:
      x-rate-limit-requests-per-minute: 60
      tags:
        - Admin
      summary: Get a quest (admin, ungated)
      description: |
        Get the full quest with ALL posts and full content. No publish date
        filtering, no progress or tier gating. Requires admin role.
        Use this endpoint for content management; use GET /quests/{questId}
        to experience the quest as a user.
      operationId: adminGetQuest
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Quest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - jwtBearer: []
  /admin/stats:
    get:
      x-rate-limit-requests-per-minute: 60
      tags:
        - Admin
      summary: Admin statistics
      description: Administrative operations requiring admin role.
      operationId: adminStats
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - jwtBearer: []
  /battles:
    get:
      x-rate-limit-requests-per-minute: 300
      tags:
        - Battle
      summary: List battles
      description: List battles with optional filtering and pagination
      operationId: listBattles
      parameters:
        - $ref: '#/components/parameters/battleSearchQuery'
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BattlePage'
          description: Success
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - jwtBearer: []
    post:
      x-rate-limit-requests-per-minute: 30
      tags:
        - Battle
      summary: Create a battle
      description: Create a new battle between two AI models.
      operationId: createBattle
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BattleCreateRequest'
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BattleCreateResponse'
          description: Battle created successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - jwtBearer: []
  /battles/{battleId}:
    parameters:
      - $ref: '#/components/parameters/battleId'
    get:
      x-rate-limit-requests-per-minute: 300
      tags:
        - Battle
      summary: Get a battle by ID
      description: Returns a single battle by its unique identifier
      operationId: getBattle
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Battle'
          description: Success
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - jwtBearer: []
    patch:
      x-rate-limit-requests-per-minute: 30
      tags:
        - Battle
      summary: Update a battle
      description: Update a battle's end time or other properties
      operationId: updateBattle
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BattleUpdateRequest'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Battle'
          description: Battle updated successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - jwtBearer: []
    delete:
      x-rate-limit-requests-per-minute: 30
      tags:
        - Battle
      summary: Delete a battle
      description: Delete a battle by its unique identifier
      operationId: deleteBattle
      responses:
        '204':
          description: Battle deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - jwtBearer: []
  /battles/{battleId}/rounds:
    parameters:
      - $ref: '#/components/parameters/battleId'
    post:
      x-rate-limit-requests-per-minute: 60
      tags:
        - Battle
      summary: Create a battle round
      description: Create a new round for a given battle.
      operationId: createBattleRound
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BattleRoundCreateRequest'
      responses:
        '201':
          description: Battle round created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BattleRound'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - jwtBearer: []
  /battles/{battleId}/rounds/{roundId}:
    parameters:
      - $ref: '#/components/parameters/battleId'
      - $ref: '#/components/parameters/roundId'
    patch:
      x-rate-limit-requests-per-minute: 30
      tags:
        - Battle
      summary: Update a battle round
      description: Update an existing battle round.
      operationId: updateBattleRound
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BattleRoundUpdateRequest'
      responses:
        '200':
          description: Battle round updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BattleRound'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - jwtBearer: []
  /battles/{battleId}/rounds/{roundId}/stream:
    parameters:
      - $ref: '#/components/parameters/battleId'
      - $ref: '#/components/parameters/roundId'
      - name: modelId
        description: The model to stream
        in: query
        required: true
        schema:
          $ref: '#/components/schemas/ModelId'
    post:
      x-rate-limit-requests-per-minute: 60
      tags:
        - Battle
      summary: Stream a chat completion for a battle round
      description: Sends the round's prompt and conversation history to the specified model via ai-service and returns the response as a streaming HTTP response (text/event-stream). The completed response is persisted as a message after the stream ends.
      operationId: createBattleRoundCompletion
      responses:
        '200':
          description: Streaming HTTP response with chat completion chunks
          content:
            text/event-stream:
              schema:
                $ref: '#/components/schemas/ModelChatCompletionChunk'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - jwtBearer: []
  /example-prompts:
    get:
      x-anonymous-access: true
      x-rate-limit-requests-per-minute: 100
      tags:
        - Example Prompt
      summary: List example prompts
      description: Get a list of example prompts with comprehensive filtering options
      operationId: listExamplePrompts
      parameters:
        - $ref: '#/components/parameters/examplePromptSearchQuery'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExamplePromptPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - jwtBearer: []
    post:
      x-rate-limit-requests-per-minute: 60
      tags:
        - Example Prompt
      summary: Create an example prompt
      description: Create a new example prompt (admin only). The new prompt is created as inactive regardless of the active field in the request body; a reviewer publishes it via PATCH. AI auto-categorization runs asynchronously unless categories are provided.
      operationId: createExamplePrompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExamplePromptCreateRequest'
      responses:
        '201':
          description: Example prompt created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExamplePrompt'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - jwtBearer: []
  /example-prompts/{examplePromptId}:
    parameters:
      - $ref: '#/components/parameters/examplePromptId'
    get:
      x-anonymous-access: true
      x-rate-limit-requests-per-minute: 100
      tags:
        - Example Prompt
      summary: Get an example prompt
      description: Get an example prompt by ID.
      operationId: getExamplePrompt
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExamplePrompt'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - jwtBearer: []
    patch:
      x-rate-limit-requests-per-minute: 30
      tags:
        - Example Prompt
      summary: Update an example prompt
      description: Partially update an example prompt (admin only). Only fields present in the request body are modified. If the question text changes, AI auto-categorization runs asynchronously.
      operationId: updateExamplePrompt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExamplePromptUpdateRequest'
      responses:
        '200':
          description: Example prompt updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExamplePrompt'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - jwtBearer: []
    delete:
      x-rate-limit-requests-per-minute: 60
      tags:
        - Example Prompt
      summary: Delete an example prompt
      description: Delete an example prompt (admin only).
      operationId: deleteExamplePrompt
      responses:
        '204':
          description: Example prompt deleted successfully
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - jwtBearer: []
  /example-prompts/{examplePromptId}/categorizations:
    parameters:
      - $ref: '#/components/parameters/examplePromptId'
    get:
      x-rate-limit-requests-per-minute: 60
      tags:
        - Example Prompt
      summary: List example prompt categorizations
      description: Get all categorizations for an example prompt (admin only).
      operationId: listExamplePromptCategorizations
      responses:
        '200':
          description: List of example prompt categorizations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ExamplePromptCategorizationResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - jwtBearer: []
    post:
      x-rate-limit-requests-per-minute: 60
      tags:
        - Example Prompt
      summary: Create an example prompt categorization
      description: Manually categorize an example prompt (admin only). The created categorization is automatically set as the effective categorization.
      operationId: createExamplePromptCategorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExamplePromptCategorizationCreateRequest'
      responses:
        '201':
          description: Example prompt categorization created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExamplePromptCategorizationResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - jwtBearer: []
  /example-prompts/{examplePromptId}/categorizations/effective:
    parameters:
      - $ref: '#/components/parameters/examplePromptId'
    patch:
      x-rate-limit-requests-per-minute: 30
      tags:
        - Example Prompt
      summary: Set effective example prompt categorization
      description: Set or clear the effective categorization for an example prompt by pointing at a row from history. Pass null to clear. Admin only.
      operationId: setEffectiveExamplePromptCategorization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SetEffectiveCategorizationRequest'
      responses:
        '200':
          description: Effective categorization updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExamplePrompt'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - jwtBearer: []
  /example-prompts/{examplePromptId}/categorizations/run:
    parameters:
      - $ref: '#/components/parameters/examplePromptId'
    post:
      x-rate-limit-requests-per-minute: 30
      tags:
        - Example Prompt
      summary: Run an automated categorization
      description: Run an automated AI categorization against an example prompt. Returns 201 with the persisted row when the AI matched at least one category, or 204 when the AI could not match any category from the taxonomy (no row is persisted in that case). Admin only.
      operationId: runExamplePromptCategorization
      responses:
        '201':
          description: Categorization completed and persisted successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExamplePromptCategorizationResponse'
        '204':
          description: Categorization run completed but the AI did not match any category
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - jwtBearer: []
  /leaderboards:
    get:
      x-anonymous-access: true
      x-rate-limit-requests-per-minute: 100
      tags:
        - Leaderboard
      summary: List all available leaderboards
      description: Get a list of all available leaderboards with their metadata
      operationId: listLeaderboards
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaderboardList'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - jwtBearer: []
  /leaderboards/{leaderboardId}:
    parameters:
      - $ref: '#/components/parameters/leaderboardId'
    get:
      x-anonymous-access: true
      x-rate-limit-requests-per-minute: 100
      tags:
        - Leaderboard
      summary: Get leaderboard entries
      description: Get paginated leaderboard entries for a specific leaderboard
      operationId: getLeaderboard
      parameters:
        - $ref: '#/components/parameters/leaderboardSearchQuery'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaderboardEntryPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - jwtBearer: []
  /leaderboards/{leaderboardId}/history/{modelId}:
    parameters:
      - $ref: '#/components/parameters/leaderboardId'
      - $ref: '#/components/parameters/modelId'
    get:
      x-anonymous-access: true
      x-rate-limit-requests-per-minute: 100
      tags:
        - Leaderboard
      summary: Get model performance history
      description: Get historical performance data for a specific model in a leaderboard
      operationId: getModelHistory
      parameters:
        - $ref: '#/components/parameters/leaderboardModelHistoryQuery'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaderboardModelHistoryPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - jwtBearer: []
  /leaderboards/{leaderboardId}/snapshots:
    parameters:
      - $ref: '#/components/parameters/leaderboardId'
    get:
      x-anonymous-access: true
      x-rate-limit-requests-per-minute: 100
      tags:
        - Leaderboard
      summary: Get public leaderboard snapshots
      description: Get a paginated list of public snapshots for a leaderboard.
      operationId: getLeaderboardSnapshots
      parameters:
        - $ref: '#/components/parameters/leaderboardSnapshotQuery'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LeaderboardSnapshotPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - jwtBearer: []
  /models:
    get:
      x-anonymous-access: true
      x-rate-limit-requests-per-minute: 100
      tags:
        - Model
      summary: List models
      description: Get a paginated list of models with optional filters (e.g., active)
      operationId: listModels
      parameters:
        - $ref: '#/components/parameters/modelSearchQuery'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ModelPage'
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - jwtBearer: []
  /models/{modelId}/errors:
    parameters:
      - $ref: '#/components/parameters/modelId'
    post:
      x-rate-limit-requests-per-minute: 60
      tags:
        - Model
      summary: Report a model error
      description: Report an error that occurred during model interaction.
      operationId: createModelError
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ModelErrorCreateRequest'
            examples:
              rateLimitError:
                summary: Rate limit error
                value:
                  code: 429
                  message: Rate limit exceeded
                  battleId: 123e4567-e89b-12d3-a456-426614174000
                  roundId: 123e4567-e89b-12d3-a456-426614174001
      responses:
        '201':

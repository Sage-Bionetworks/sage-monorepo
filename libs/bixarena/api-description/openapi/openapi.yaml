                  expires_in:
                    type: integer
                    description: Token lifetime in seconds
                required:
                  - access_token
                  - token_type
                  - expires_in
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /userinfo:
    get:
      x-rate-limit-requests-per-minute: 60
      tags:
        - Auth
      summary: Get current user profile
      description: |
        Returns the authenticated user's profile information.
        This is an OIDC-compliant UserInfo endpoint that provides details about the currently authenticated user.

        Requires a valid JWT obtained via the `/token` endpoint or an active session.
      operationId: getUserInfo
      responses:
        '200':
          description: User profile information
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserInfo'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
      security:
        - jwtBearer: []
  /.well-known/jwks.json:
    get:
      x-anonymous-access: true
      x-rate-limit-requests-per-minute: 100
      tags:
        - Auth
      summary: JSON Web Key Set
      description: Returns the public keys used to verify internally issued JWTs.
      operationId: getJwks
      security: []
      responses:
        '200':
          description: JWKS document
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      type: object
        '400':
          $ref: '#/components/responses/BadRequest'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
components:
  schemas:
    ModelId:
      description: UUID of an AI model.
      type: string
      format: uuid
      example: 1a2b3c4d-5e6f-7a8b-9c0d-1e2f3a4b5c6d
    MessageRole:
      type: string
      description: The role of a message.
      maxLength: 20
      enum:
        - system
        - user
        - assistant
      example: user
    MessageContent:
      type: string
      description: The content of a message.
      maxLength: 10000
      example: What is the capital of France?
    MessageCreate:
      type: object
      description: Payload used to create a message.
      properties:
        role:
          $ref: '#/components/schemas/MessageRole'
        content:
          $ref: '#/components/schemas/MessageContent'
      required:
        - role
        - content
    ModelChatRequest:
      type: object
      description: Request payload for creating a chat completion
      properties:
        modelId:
          $ref: '#/components/schemas/ModelId'
        apiModelName:
          type: string
          description: The model name used for API calls.
          example: anthropic/claude-sonnet-4.5
        apiBase:
          type: string
          description: Base URL for the model API.
          example: https://openrouter.ai/api/v1
        messages:
          type: array
          items:
            $ref: '#/components/schemas/MessageCreate'
          description: The conversation messages to send to the model
      required:
        - modelId
        - apiModelName
        - apiBase
        - messages
    ModelErrorMessage:
      type: string
      description: Error message describing what went wrong.
      minLength: 1
      maxLength: 1000
      example: Rate limit exceeded
    ModelChatUsage:
      type: object
      description: Token usage and generation parameters for the chat completion
      properties:
        model:
          type: string
          description: The model identifier that was used
        temperature:
          type: number
          format: float
          description: The sampling temperature that was used
        topP:
          type: number
          format: float
          description: The nucleus sampling parameter that was used
        maxTokens:
          type: integer
          description: The maximum token limit that was set
        promptTokens:
          type: integer
          description: Number of tokens in the prompt
        completionTokens:
          type: integer
          description: Number of tokens in the completion
        totalTokens:
          type: integer
          description: Total number of tokens used
      required:
        - promptTokens
        - completionTokens
        - totalTokens
    ModelChatCompletionChunk:
      type: object
      description: A streaming event chunk from the model chat completion
      properties:
        content:
          $ref: '#/components/schemas/MessageContent'
        status:
          type: string
          enum:
            - streaming
            - complete
            - error
          description: Current state of the streaming response
        finishReason:
          type: string
          nullable: true
          enum:
            - stop
            - length
            - content_filter
            - error
          description: Reason the model stopped generating
        errorMessage:
          $ref: '#/components/schemas/ModelErrorMessage'
        usage:
          $ref: '#/components/schemas/ModelChatUsage'
      required:
        - status
    BasicError:
      type: object
      description: Problem details (tools.ietf.org/html/rfc7807)
      properties:
        title:
          type: string
          description: A human readable documentation for the problem type
        status:
          type: integer
          description: The HTTP status code
        detail:
          type: string
          description: A human readable explanation specific to this occurrence of the problem
        type:
          type: string
          description: An absolute URI that identifies the problem type
        instance:
          type: string
          description: An absolute URI that identifies the specific occurrence of the problem
      required:
        - title
        - status
    RateLimitError:
      allOf:
        - $ref: '#/components/schemas/BasicError'
        - type: object
          properties:
            limit:
              type: integer
              description: Maximum requests allowed per window
              example: 100
            window:
              type: string
              description: Time window for rate limiting
              example: 1 minute
            retryAfterSeconds:
              type: integer
              description: Seconds to wait before retrying
              example: 18
          required:
            - limit
            - window
            - retryAfterSeconds
    QuestPost:
      type: object
      description: A single quest post. Content fields (description, images) are null/empty when the caller does not meet unlock gates.
      properties:
        postIndex:
          type: integer
          description: Display ordering index (0-based)
          minimum: 0
          maximum: 99
          example: 0
        date:
          type: string
          format: date
          nullable: true
          description: Optional display date for the post
          example: '2026-02-03'
        title:
          type: string
          description: Post heading (always visible for published posts)
          maxLength: 300
          example: 'Chapter 1: Laying the First Stones'
        description:
          type: string
          nullable: true
          description: Post content text. Null when the caller does not meet unlock gates.
          maxLength: 100000
          example: The arena walls began to rise...
        images:
          type: array
          description: Image URLs for the post. Empty when the caller does not meet unlock gates.
          maxItems: 50
          items:
            type: string
            format: uri
        publishDate:
          type: string
          format: date-time
          nullable: true
          description: Post is hidden entirely before this timestamp. Null means immediately visible.
          example: '2026-03-16T09:00:00Z'
        requiredProgress:
          type: integer
          nullable: true
          description: Minimum quest-wide battle count required to unlock content. Null means no progress gate.
          minimum: 0
          example: 500
        requiredTier:
          type: string
          enum:
            - knight
            - champion
          nullable: true
          description: Minimum contributor tier required to unlock content. Null means public access.
          example: knight
        locked:
          type: boolean
          description: Whether the post content is locked for the current caller. True when the caller does not meet the required progress or tier gates. Always false for posts with no gates.
          example: false
      required:
        - postIndex
        - title
        - images
        - locked
    Quest:
      type: object
      description: A community quest with its metadata and posts
      properties:
        questId:
          type: string
          description: Unique identifier for the quest
          example: build-bioarena-together
        title:
          type: string
          description: Quest display title
          maxLength: 200
          example: Build BioArena Together
        description:
          type: string
          description: Quest narrative description
          maxLength: 5000
          example: Join forces to build an arena together...
        goal:
          type: integer
          description: Target total battle count for the quest
          minimum: 0
          example: 2850
        startDate:
          type: string
          format: date-time
          description: Quest start date
          example: '2026-02-01T00:00:00Z'
        endDate:
          type: string
          format: date-time
          description: Quest end date
          example: '2026-04-30T23:59:59Z'
        activePostIndex:
          type: integer
          description: Index of the post to expand by default in the UI
          minimum: 0
          maximum: 99
          example: 4
        totalBlocks:
          type: integer
          description: Current total number of completed battles during the quest period
          minimum: 0
          example: 150
        posts:
          type: array
          description: Quest posts ordered by post index
          items:
            $ref: '#/components/schemas/QuestPost'
      required:
        - questId
        - title
        - description
        - goal
        - startDate
        - endDate
        - activePostIndex
        - totalBlocks
        - posts
    BattleSort:
      description: What to sort battles by.
      type: string
      enum:
        - created_at
      default: created_at
      example: created_at
    SortDirection:
      type: string
      description: The direction to sort results.
      enum:
        - asc
        - desc
      default: asc
      example: desc
    BattleSearchQuery:
      type: object
      description: A battle search query.
      properties:
        pageNumber:
          description: The page number to return (0-indexed).
          type: integer
          format: int32
          default: 0
          minimum: 0
          example: 0
        pageSize:
          description: The number of items to return in a single page.
          type: integer
          format: int32
          default: 100
          minimum: 1
          example: 10
        sort:
          $ref: '#/components/schemas/BattleSort'
        direction:
          $ref: '#/components/schemas/SortDirection'
        userId:
          description: Filter by user ID.
          type: string
          format: uuid
          nullable: true
          example: a1b2c3d4-e5f6-7a8b-9c0d-1e2f3a4b5c6d
      required:
        - pageNumber
        - pageSize
        - sort
        - direction
    BattleId:
      type: string
      format: uuid
      description: Unique identifier (UUID) of the battle.
      example: 5f6c2d84-5c1a-4b2e-b3d7-0c2a1f9e8a6f
    BattleTitle:
      description: Title of the battle.
      type: string
      example: Gene Expression Analysis Comparison
    UserId:
      description: UUID of a user.
      type: string
      format: uuid
      example: a1b2c3d4-e5f6-7a8b-9c0d-1e2f3a4b5c6d
    CreatedAt:
      description: Timestamp when the entity was created.
      type: string
      format: date-time
      example: '2024-01-15T10:30:00Z'
    EndedAt:
      description: Timestamp when the entity ended.
      type: string
      format: date-time
      example: '2024-01-15T11:45:00Z'
    Battle:
      type: object
      description: A battle entity representing a comparison between two AI models.
      properties:
        id:
          $ref: '#/components/schemas/BattleId'
        title:
          $ref: '#/components/schemas/BattleTitle'
          nullable: true
        userId:
          $ref: '#/components/schemas/UserId'
        model1Id:
          $ref: '#/components/schemas/ModelId'
        model2Id:
          $ref: '#/components/schemas/ModelId'
        createdAt:
          $ref: '#/components/schemas/CreatedAt'
        endedAt:
          $ref: '#/components/schemas/EndedAt'
          nullable: true
        effectiveValidationId:
          type: string
          format: uuid
          nullable: true
          description: ID of the effective battle validation (null = not yet validated)
        effectiveCategorizationId:
          type: string
          format: uuid
          nullable: true
          description: ID of the effective battle categorization (null = not yet categorized)
      required:
        - id
        - userId
        - model1Id
        - model2Id
        - createdAt
    PageMetadata:
      type: object
      description: The metadata of a page.
      properties:
        number:
          description: The page number.
          type: integer
          format: int32
          example: 99
        size:
          description: The number of items in a single page.
          type: integer
          format: int32
          example: 99
        totalElements:
          description: Total number of elements in the result set.
          type: integer
          format: int64
          example: 99
        totalPages:
          description: Total number of pages in the result set.
          type: integer
          format: int32
          example: 99
        hasNext:
          description: Returns if there is a next page.
          type: boolean
          example: true
        hasPrevious:
          description: Returns if there is a previous page.
          type: boolean
          example: true
      required:
        - number
        - size
        - totalElements
        - totalPages
        - hasNext
        - hasPrevious
    BattlePage:
      type: object
      description: A page of battles.
      properties:
        battles:
          description: List of battles in this page.
          type: array
          items:
            $ref: '#/components/schemas/Battle'
        page:
          $ref: '#/components/schemas/PageMetadata'
      required:
        - battles
        - page
    BattleCreateRequest:
      type: object
      description: The information used to create a new battle.
      properties:
        title:
          $ref: '#/components/schemas/BattleTitle'
          nullable: true
    License:
      type: string
      description: The license of the model
      enum:
        - open-source
        - commercial
      example: open-source
    Model:
      type: object
      description: A model entity.
      properties:
        id:
          type: string
          description: Unique identifier (UUID) of the model.
          example: 5f6c2d84-5c1a-4b2e-b3d7-0c2a1f9e8a6f
        slug:
          type: string
          description: URL-friendly unique slug for the model.
          example: my-awesome-model
        alias:
          type: string
          nullable: true
          description: Alternative name or alias for the model.
          example: awesome-model-v2
        name:
          type: string
          description: Human-readable name of the model.
          example: My Awesome Model
        organization:
          type: string
          nullable: true
          description: Organization that developed or maintains the model.
          example: OpenAI
        license:
          $ref: '#/components/schemas/License'
        active:
          type: boolean
          description: Whether the model is active/visible.
          example: true
        externalLink:
          type: string
          description: External URL with more information about the model.
          example: https://openrouter.ai/models/openai/gpt-4
        description:
          type: string
          nullable: true
          minLength: 1
          maxLength: 300
          description: Detailed description of the model.
          example: A large multimodal model that can process text and images.
        apiModelName:
          type: string
          description: The model name used for API calls.
          example: anthropic/claude-sonnet-4.5
        apiBase:
          type: string
          description: Base URL for the model API.
          example: https://openrouter.ai/api/v1
        createdAt:
          type: string
          format: date-time
          description: When the model was created.
          example: '2025-09-15T12:00:00Z'
        updatedAt:
          type: string
          format: date-time
          description: When the model was last updated.
          example: '2025-09-20T08:30:00Z'
      required:
        - id
        - slug
        - name
        - license
        - active
        - externalLink
        - apiModelName
        - apiBase
        - createdAt
        - updatedAt
    BattleCreateResponse:
      type: object
      description: A battle between two AI models.
      properties:
        id:
          $ref: '#/components/schemas/BattleId'
        title:
          $ref: '#/components/schemas/BattleTitle'
          nullable: true
        userId:
          $ref: '#/components/schemas/UserId'
        model1:
          $ref: '#/components/schemas/Model'
        model2:
          $ref: '#/components/schemas/Model'
        createdAt:
          $ref: '#/components/schemas/CreatedAt'
        endedAt:
          $ref: '#/components/schemas/EndedAt'
          nullable: true
        effectiveValidationId:
          type: string
          format: uuid
          nullable: true
          description: ID of the effective battle validation (null = not yet validated)
      required:
        - id
        - userId
        - model1
        - model2
        - createdAt
    BattleUpdateRequest:
      type: object
      description: The information used to update a battle.
      properties:
        title:
          $ref: '#/components/schemas/BattleTitle'
          nullable: true
        endedAt:
          $ref: '#/components/schemas/EndedAt'
          nullable: true
    BattleRoundCreateRequest:
      type: object
      description: Payload to create a new battle round with the user prompt.
      properties:
        promptMessage:
          $ref: '#/components/schemas/MessageCreate'
      required:
        - promptMessage
    BattleRoundId:
      type: string
      format: uuid
      description: Unique identifier (UUID) of the battle round.
      example: 3fa85f64-5717-4562-b3fc-2c963f66afa6
    BattleRoundNumber:
      type: integer
      description: Sequential round number within a battle. Starts at 1.
      example: 1
      minimum: 1
    MessageId:
      type: string
      format: uuid
      description: Unique identifier (UUID) of the message.
      example: d290f1ee-6c54-4b01-90e6-d701748f0851
    UpdatedAt:
      description: Timestamp when the entity was last updated.
      type: string
      format: date-time
      example: '2024-01-15T10:45:00Z'
    BattleRound:
      type: object
      description: A battle round linking the prompt and model responses for a battle.
      properties:
        id:
          $ref: '#/components/schemas/BattleRoundId'
        battleId:
          $ref: '#/components/schemas/BattleId'
        roundNumber:
          $ref: '#/components/schemas/BattleRoundNumber'
        promptMessageId:
          $ref: '#/components/schemas/MessageId'
          nullable: true
        model1MessageId:
          $ref: '#/components/schemas/MessageId'
          nullable: true
        model2MessageId:
          $ref: '#/components/schemas/MessageId'
          nullable: true
        createdAt:
          $ref: '#/components/schemas/CreatedAt'
        updatedAt:
          $ref: '#/components/schemas/UpdatedAt'
      required:
        - id
        - battleId
        - roundNumber
        - createdAt
        - updatedAt
    BattleRoundUpdateRequest:
      type: object
      description: Payload to update model responses for an existing battle round.
      properties:
        model1Message:
          $ref: '#/components/schemas/MessageCreate'
        model2Message:
          $ref: '#/components/schemas/MessageCreate'
      required:
        - model1Message
        - model2Message
    ExamplePromptSort:
      type: string
      description: The field to sort example prompts by.
      enum:
        - created_at
        - random
      default: created_at
      example: random
    ExamplePromptSource:
      description: The source dataset or origin of the example prompt.
      type: string
      enum:
        - pubmedqa
        - bixbench
        - bixarena
      example: pubmedqa
    BiomedicalCategory:
      description: A category slug used to classify biomedical content.
      type: string
      enum:
        - biochemistry
        - bioengineering
        - bioinformatics
        - cancer-biology
        - cell-biology
        - clinical-trials
        - developmental-biology
        - epidemiology
        - evolutionary-biology
        - genetics
        - genomics
        - immunology
        - microbiology
        - molecular-biology
        - neuroscience
        - pathology
        - pharmacology-and-toxicology
        - physiology
        - synthetic-biology
        - systems-biology
      example: genetics
    ExamplePromptSearchQuery:
      type: object
      description: An example prompt search query with pagination and filtering options.
      properties:
        pageNumber:
          description: The page number.
          type: integer
          format: int32
          default: 0
          minimum: 0
          example: 0
        pageSize:
          description: The number of items in a single page.
          type: integer
          format: int32
          default: 25
          minimum: 1
          maximum: 100
          example: 25
        sort:
          $ref: '#/components/schemas/ExamplePromptSort'
        direction:
          $ref: '#/components/schemas/SortDirection'
        source:
          $ref: '#/components/schemas/ExamplePromptSource'
          nullable: true
        active:
          description: Filter by active status (true returns only active prompts; false only inactive; omit for all).
          type: boolean
          nullable: true
          example: true
        search:
          description: Search by question content (case-insensitive partial match).
          type: string
          nullable: true
          example: diabetes
        categories:
          description: Filter by one or more categories. Returns prompts matching any of the given categories.
          type: array
          items:
            $ref: '#/components/schemas/BiomedicalCategory'
          nullable: true
      required: []
    ExamplePrompt:
      type: object
      description: A self-contained example prompt for biomedical question answering.
      properties:
        id:
          type: string
          description: The unique identifier of the example prompt.
          example: 123e4567-e89b-12d3-a456-426614174000
        question:
          type: string
          description: The biomedical question text.
          minLength: 1
          maxLength: 160
          example: What are the main symptoms of Type 2 diabetes?
        source:
          $ref: '#/components/schemas/ExamplePromptSource'
        active:
          type: boolean
          description: Whether this example prompt is currently active/visible for use.
          example: true
        effectiveCategorizationId:
          type: string
          format: uuid
          nullable: true
          description: ID of the effective categorization for this prompt (null = not yet categorized)
        categories:
          type: array
          items:
            $ref: '#/components/schemas/BiomedicalCategory'
          maxItems: 3
          default: []
          description: Categories from the effective categorization. Empty array if not yet categorized.
        createdAt:
          type: string
          format: date-time
          description: When the example prompt was created.
          example: '2025-08-01T09:00:00Z'
      required:
        - id
        - question
        - source
        - active
        - categories
        - createdAt
    ExamplePromptPage:
      type: object
      description: A page of example prompts.
      allOf:
        - $ref: '#/components/schemas/PageMetadata'
        - type: object
          properties:
            examplePrompts:
              type: array
              description: A list of example prompts.
              items:
                $ref: '#/components/schemas/ExamplePrompt'
          required:
            - examplePrompts
    ExamplePromptCreateRequest:
      type: object
      description: The information used to create or update an example prompt.
      properties:
        question:
          type: string
          description: The biomedical question text.
          minLength: 1
          maxLength: 160
          example: What are the main symptoms of Type 2 diabetes?
        source:
          $ref: '#/components/schemas/ExamplePromptSource'
        active:
          type: boolean
          description: Whether this example prompt is currently active/visible for use.
          example: true
        categories:
          type: array
          items:
            $ref: '#/components/schemas/BiomedicalCategory'
          minItems: 1
          maxItems: 3
          nullable: true
          description: Human override categories. If provided, a manual categorization is created and reason is required. If absent, AI auto-categorization runs asynchronously.
        reason:
          type: string
          maxLength: 1000
          nullable: true
          description: Reason for the manual categorization decision, if categories is provided.
      required:
        - question
        - source
        - active
    ExamplePromptUpdateRequest:
      type: object
      description: The information used to update an example prompt. Only fields present in the request are modified.
      properties:
        question:
          type: string
          description: The biomedical question text.
          minLength: 1
          maxLength: 160
          nullable: true
          example: What are the main symptoms of Type 2 diabetes?
        source:
          $ref: '#/components/schemas/ExamplePromptSource'
          nullable: true
        active:
          type: boolean
          description: Whether this example prompt is currently active/visible for use.
          nullable: true
          example: true
    ExamplePromptCategorizationResponse:
      type: object
      description: The result of a categorization run for an example prompt.
      properties:
        id:
          type: string
          format: uuid
        promptId:
          type: string
          format: uuid
        categories:
          type: array
          items:
            $ref: '#/components/schemas/BiomedicalCategory'
          minItems: 1
          maxItems: 3
        method:
          type: string
          maxLength: 100
        categorizedBy:
          type: string
          format: uuid
          nullable: true
          description: User ID of the categorizer. Null for AI runs.
        reason:
          type: string
          maxLength: 1000
          nullable: true
          description: Human override reason. Always null for AI runs.
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - promptId
        - categories
        - method
        - createdAt
    ExamplePromptCategorizationCreateRequest:
      type: object
      description: Request to manually categorize an example prompt.
      properties:
        categories:
          type: array
          items:
            $ref: '#/components/schemas/BiomedicalCategory'
          minItems: 1
          maxItems: 3
        reason:
          type: string
          maxLength: 1000
          nullable: true
          description: Reason for the categorization decision
      required:
        - categories
    SetEffectiveCategorizationRequest:
      type: object
      description: Request to set or clear the effective categorization for an example prompt or battle.
      properties:
        categorizationId:
          type: string
          format: uuid
          nullable: true
          description: ID of the categorization row to set as effective. Set to null to clear the effective categorization.
    LeaderboardList:
      type: array
      description: A list of leaderboards.
      items:
        type: object
        properties:
          id:
            type: string
            description: Unique identifier for the leaderboard
            example: open-source
          name:
            type: string
            description: Display name for the leaderboard
            example: Open Source Models
          description:
            type: string
            description: Description of what this leaderboard measures
            example: Performance ranking of open-source AI models
          updatedAt:
            type: string
            format: date-time
            description: When this leaderboard was last updated
            example: '2025-08-16T14:30:00Z'
        required:
          - id
          - name
          - description
          - updatedAt
    LeaderboardSort:
      type: string
      description: The field to sort leaderboard entries by.
      enum:
        - rank
        - created_at
      default: rank
      example: rank
    LeaderboardSearchQuery:
      type: object
      description: A leaderboard search query with pagination and filtering options.
      properties:
        pageNumber:
          description: The page number.
          type: integer
          format: int32
          default: 0
          minimum: 0
          example: 0
        pageSize:
          description: The number of items in a single page.
          type: integer
          format: int32
          default: 100
          minimum: 1
          maximum: 1000
          example: 25
        sort:
          $ref: '#/components/schemas/LeaderboardSort'
        direction:
          $ref: '#/components/schemas/SortDirection'
        search:
          description: Search by model name (case-insensitive partial match).
          type: string
          nullable: true
          example: gpt
        snapshotId:
          description: Get a specific historical snapshot instead of latest.
          type: string
          nullable: true
          example: snapshot_2025-08-15_10-00
    LeaderboardEntry:
      type: object
      description: A single entry in a leaderboard representing a model's performance.
      properties:
        id:
          type: string
          description: Unique identifier for this leaderboard entry
          example: entry_123
        modelId:
          type: string
          description: Identifier for the model
          example: model_456
        modelName:
          type: string
          description: Display name of the model
          example: GPT-4o
        modelOrganization:
          type: string
          maxLength: 200
          description: Organization that created the model
          example: OpenAI
          nullable: true
        modelUrl:
          type: string
          maxLength: 300
          description: External link to model information
          example: https://openai.com/gpt-4
        license:
          type: string
          description: License type of the model
          example: MIT
        btScore:
          type: number
          format: double
          description: Bradley-Terry score - primary ranking metric
          example: 0.925
        voteCount:
          type: integer
          description: Number of votes/evaluations
          example: 1250
        rank:
          type: integer
          description: Current rank position (1-based)
          example: 1
        bootstrapQ025:
          type: number
          format: double
          description: Bootstrap confidence interval lower bound (2.5th percentile)
          example: 887
        bootstrapQ975:
          type: number
          format: double
          description: Bootstrap confidence interval upper bound (97.5th percentile)
          example: 1063
        createdAt:
          type: string
          format: date-time
          description: When this entry was created
          example: '2025-08-16T10:30:00Z'
      required:
        - id
        - modelId
        - modelName
        - modelUrl
        - license
        - btScore
        - voteCount
        - rank
        - bootstrapQ025
        - bootstrapQ975
        - createdAt
    LeaderboardEntryPage:
      type: object
      description: A page of leaderboard entries.
      allOf:
        - $ref: '#/components/schemas/PageMetadata'
        - type: object
          properties:
            updatedAt:
              type: string
              format: date-time
              description: When this leaderboard was last updated
              example: '2025-08-16T14:30:00Z'
            snapshotId:
              type: string
              description: Identifier for this snapshot/timepoint
              example: snapshot_2025-08-16_14-30
            entries:
              description: A list of leaderboard entries.
              type: array
              items:
                $ref: '#/components/schemas/LeaderboardEntry'
          required:
            - updatedAt
            - snapshotId
            - entries
    LeaderboardHistorySort:
      type: string
      description: The field to sort historical entries by.
      enum:
        - created_at
        - bt_score
        - rank
      default: created_at
      example: created_at
    LeaderboardModelHistoryQuery:
      type: object
      description: A query for retrieving historical leaderboard data for a model.
      properties:
        pageNumber:
          description: The page number.
          type: integer
          format: int32
          default: 0
          minimum: 0
          example: 0
        pageSize:
          description: The number of items in a single page.
          type: integer
          format: int32
          default: 100
          minimum: 1
          maximum: 1000
          example: 50
        sort:
          $ref: '#/components/schemas/LeaderboardHistorySort'
        direction:
          $ref: '#/components/schemas/SortDirection'
        fromDate:
          description: Include only entries created on or after this date.
          type: string
          format: date
          nullable: true
          example: '2025-08-01'
        toDate:
          description: Include only entries created on or before this date.
          type: string
          format: date
          nullable: true
          example: '2025-08-16'
    HistoricalLeaderboardEntry:
      type: object
      description: A historical entry representing a model's performance at a specific point in time.
      properties:
        snapshotId:
          type: string
          description: Identifier for the snapshot/timepoint
          example: snapshot_2025-08-15_10-00
        btScore:
          type: number
          format: double
          description: Bradley-Terry score - primary ranking metric at this point in time
          example: 0.915
        voteCount:
          type: integer
          description: Number of votes/evaluations at this point in time
          example: 1180
        rank:
          type: integer
          description: Rank position at this point in time (1-based)
          example: 2
        bootstrapQ025:
          type: number
          format: double
          description: Bootstrap confidence interval lower bound (2.5th percentile)
          example: 875
        bootstrapQ975:
          type: number
          format: double
          description: Bootstrap confidence interval upper bound (97.5th percentile)
          example: 1055
        createdAt:
          type: string
          format: date-time
          description: When this snapshot was created
          example: '2025-08-15T10:00:00Z'
      required:
        - snapshotId
        - btScore
        - voteCount
        - rank
        - bootstrapQ025
        - bootstrapQ975
        - createdAt
    LeaderboardModelHistoryPage:
      type: object
      description: A page of historical leaderboard entries for a specific model.
      allOf:
        - $ref: '#/components/schemas/PageMetadata'
        - type: object
          properties:
            modelId:
              type: string
              description: Identifier for the model
              example: model_456
            modelName:
              type: string
              description: Display name of the model
              example: GPT-4o
            history:
              description: A list of historical leaderboard entries.
              type: array
              items:
                $ref: '#/components/schemas/HistoricalLeaderboardEntry'
          required:
            - modelId
            - modelName
            - history
    LeaderboardSnapshotSort:
      type: string
      description: The field to sort snapshots by.
      enum:
        - created_at
      default: created_at
      example: created_at
    LeaderboardSnapshotQuery:
      type: object
      description: A query for retrieving leaderboard snapshots.
      properties:
        pageNumber:
          description: The page number.
          type: integer
          format: int32
          default: 0
          minimum: 0
          example: 0
        pageSize:
          description: The number of items in a single page.
          type: integer
          format: int32
          default: 100
          minimum: 1
          maximum: 1000
          example: 20
        sort:
          $ref: '#/components/schemas/LeaderboardSnapshotSort'
        direction:
          $ref: '#/components/schemas/SortDirection'
    Visibility:
      type: string
      maxLength: 20
      enum:
        - public
        - private
      description: Visibility status of a resource.
      default: private
      example: public
    LeaderboardSnapshot:
      type: object
      description: A snapshot representing the state of a leaderboard at a specific point in time.
      properties:
        id:
          type: string
          description: Unique identifier for this snapshot
          example: snapshot_2025-08-16_14-30
        visibility:
          $ref: '#/components/schemas/Visibility'
        createdAt:
          type: string
          format: date-time
          description: When this snapshot was created
          example: '2025-08-16T14:30:00Z'
        updatedAt:
          $ref: '#/components/schemas/UpdatedAt'
        entryCount:
          type: integer
          description: Number of models in this snapshot
          example: 50
        description:
          type: string
          nullable: true
          description: Optional description of this snapshot
          example: Weekly evaluation run
      required:
        - id
        - visibility
        - createdAt
        - updatedAt
        - entryCount
    LeaderboardSnapshotPage:
      type: object
      description: A page of leaderboard snapshots.
      allOf:
        - $ref: '#/components/schemas/PageMetadata'
        - type: object
          properties:
            snapshots:
              description: A list of leaderboard snapshots.
              type: array
              items:
                $ref: '#/components/schemas/LeaderboardSnapshot'
          required:
            - snapshots
    ModelSort:
      type: string
      description: The field to sort models by.
      enum:
        - name
        - created_at
        - updated_at
        - slug
        - license
        - active
      default: name
      example: created_at
    ModelSearchQuery:
      type: object
      description: A model search query with pagination and filtering options.
      properties:
        pageNumber:
          description: The page number.
          type: integer
          format: int32
          default: 0
          minimum: 0
          example: 0
        pageSize:
          description: The number of items in a single page.
          type: integer
          format: int32
          default: 25
          minimum: 1
          maximum: 100
          example: 25
        sort:
          $ref: '#/components/schemas/ModelSort'
        direction:
          $ref: '#/components/schemas/SortDirection'
        search:
          description: Search by model name or slug (case-insensitive partial match).
          type: string
          nullable: true
          example: vision
        active:
          description: Filter by active status (true returns only active models; false only inactive; omit for all).
          type: boolean
          nullable: true
          example: true
        license:
          description: Filter by license type.
          $ref: '#/components/schemas/License'
        organization:
          description: Filter by organization name (case-insensitive partial match).
          type: string
          nullable: true
          example: OpenAI
      required: []
    ModelPage:
      type: object
      description: A page of models.
      allOf:
        - $ref: '#/components/schemas/PageMetadata'
        - type: object
          properties:
            models:
              type: array
              description: A list of models.
              items:
                $ref: '#/components/schemas/Model'
          required:
            - models
    ModelErrorCode:
      type: integer
      nullable: true
      description: HTTP status code from the error response.
      example: 429
    ModelErrorCreateRequest:
      type: object
      description: Request to report a model error.
      properties:
        code:
          $ref: '#/components/schemas/ModelErrorCode'
        message:
          $ref: '#/components/schemas/ModelErrorMessage'
        battleId:
          $ref: '#/components/schemas/BattleId'
        roundId:
          $ref: '#/components/schemas/BattleRoundId'
      required:
        - message
        - battleId
        - roundId
    ModelErrorId:
      type: string
      format: uuid
      description: Unique identifier of the model error record.
      example: 98765432-e89b-12d3-a456-426614174099
    ModelError:
      type: object
      description: Record of a model error that occurred during interaction.
      properties:
        id:
          $ref: '#/components/schemas/ModelErrorId'
        modelId:
          $ref: '#/components/schemas/ModelId'
        code:
          $ref: '#/components/schemas/ModelErrorCode'
        message:
          $ref: '#/components/schemas/ModelErrorMessage'
        battleId:
          $ref: '#/components/schemas/BattleId'
        roundId:
          $ref: '#/components/schemas/BattleRoundId'
        createdAt:
          $ref: '#/components/schemas/CreatedAt'
      required:
        - id
        - modelId
        - message
        - battleId
        - roundId
        - createdAt
    BattleEvaluationOutcome:
      type: string
      description: The outcome of the battle evaluation between model1 and model2.
      maxLength: 20
      enum:
        - model1
        - model2
        - tie
    BattleEvaluationCreateRequest:
      type: object
      description: The information used to create a new battle evaluation.
      properties:
        outcome:
          $ref: '#/components/schemas/BattleEvaluationOutcome'
      required:
        - outcome
    BattleEvaluationId:
      type: string
      format: uuid
      description: The unique identifier of the battle evaluation
    BattleEvaluation:
      type: object
      description: A battle evaluation describing the outcome of a matchup.
      properties:
        id:
          $ref: '#/components/schemas/BattleEvaluationId'
        battleId:
          $ref: '#/components/schemas/BattleId'
        outcome:
          $ref: '#/components/schemas/BattleEvaluationOutcome'
        createdAt:
          $ref: '#/components/schemas/CreatedAt'
      required:
        - id
        - battleId
        - outcome
        - createdAt
    BattleCategorizationResponse:
      type: object
      description: The result of a categorization run for a battle.
      properties:
        id:
          type: string
          format: uuid
        battleId:
          type: string
          format: uuid
        categories:
          type: array
          items:
            $ref: '#/components/schemas/BiomedicalCategory'
          minItems: 1
          maxItems: 3
        method:
          type: string
          maxLength: 100
        categorizedBy:
          type: string
          format: uuid
          nullable: true
          description: User ID of the categorizer. Null for AI runs.
        reason:
          type: string
          maxLength: 1000
          nullable: true
          description: Human override reason. Always null for AI runs.
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - battleId
        - categories
        - method
        - createdAt
    BattleCategorizationCreateRequest:
      type: object
      description: Request to manually categorize a battle.
      properties:
        categories:
          type: array
          items:
            $ref: '#/components/schemas/BiomedicalCategory'
          minItems: 1
          maxItems: 3
        reason:
          type: string
          maxLength: 1000
          nullable: true
          description: Reason for the categorization decision
      required:
        - categories
    BattleValidationResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        battleId:
          type: string
          format: uuid
        method:
          type: string
          maxLength: 100
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
        isBiomedical:
          type: boolean
        validatedBy:
          type: string
          format: uuid
          nullable: true
          description: User ID of the validator (null for automated validations)
        reason:
          type: string
          maxLength: 1000
          nullable: true
          description: Optional reason for the validation decision
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - battleId
        - method
        - confidence
        - isBiomedical
        - createdAt
    BattleValidationCreateRequest:
      type: object
      description: Request to manually validate or invalidate a battle.
      properties:
        isBiomedical:
          type: boolean
          description: Whether the admin considers this battle biomedically related
        reason:
          type: string
          maxLength: 1000
          nullable: true
          description: Optional reason for the validation decision
      required:
        - isBiomedical
    SetEffectiveValidationRequest:
      type: object
      description: Request to set or clear the effective validation for a battle.
      properties:
        validationId:
          type: string
          format: uuid
          nullable: true
          description: ID of the battle validation to set as effective. Set to null to clear the effective validation.
    QuestCreateOrUpdate:
      type: object
      description: Request body for creating or updating a quest
      properties:
        questId:
          type: string
          description: Unique identifier for the quest
          minLength: 1
          maxLength: 100
          pattern: ^[a-z0-9-]+$
          example: build-bioarena-together
        title:
          type: string
          description: Quest display title
          minLength: 1
          maxLength: 200
          example: Build BioArena Together
        description:
          type: string
          description: Quest narrative description
          minLength: 1
          maxLength: 5000
          example: Join forces to build an arena together...
        goal:
          type: integer
          description: Target total battle count for the quest
          minimum: 0
          example: 2850
        startDate:
          type: string
          format: date-time
          description: Quest start date
          example: '2026-02-01T00:00:00Z'
        endDate:
          type: string
          format: date-time
          description: Quest end date
          example: '2026-04-30T23:59:59Z'
        activePostIndex:
          type: integer
          description: Index of the post to expand by default in the UI
          minimum: 0
          maximum: 99
          example: 4
      required:
        - questId
        - title
        - description
        - goal
        - startDate
        - endDate
        - activePostIndex
    QuestContributor:
      type: object
      description: A user who contributed to the quest
      properties:
        username:
          type: string
          description: User's display name
          example: tschaffter
        battleCount:
          type: integer
          description: Number of completed battles during quest period
          example: 42
        tier:
          type: string
          enum:
            - champion
            - knight
            - apprentice
          description: Contributor tier based on average battles per week
          example: champion
        battlesPerWeek:
          type: number
          format: double
          description: Average battles completed per week during quest
          example: 12.5
      required:
        - username
        - battleCount
        - tier
        - battlesPerWeek
    QuestContributors:
      type: object
      description: List of contributors to a quest with their battle counts
      properties:
        questId:
          type: string
          description: The quest identifier
          example: build-bioarena-together
        startDate:
          type: string
          format: date-time
          description: Quest start date
          example: '2026-01-20T00:00:00Z'
        endDate:
          type: string
          format: date-time
          description: Quest end date
          example: '2026-04-20T23:59:59Z'
        totalContributors:
          type: integer
          description: Total number of unique contributors
          example: 42
        contributors:
          type: array
          description: Contributors ordered by battle count (descending)
          items:
            $ref: '#/components/schemas/QuestContributor'
      required:
        - questId
        - startDate
        - endDate
        - totalContributors
        - contributors
    QuestPostCreateOrUpdate:
      type: object
      description: Request body for creating or updating a quest post
      properties:
        date:
          type: string
          format: date
          nullable: true
          description: Optional display date for the post
          example: '2026-02-03'
        title:
          type: string
          description: Post heading
          minLength: 1
          maxLength: 300
          example: 'Chapter 1: Laying the First Stones'
        description:
          type: string
          description: Post content text
          minLength: 1
          maxLength: 100000
          example: The arena walls began to rise...
        images:
          type: array
          description: List of image URLs for the post
          maxItems: 50
          items:
            type: string
            format: uri
        publishDate:
          type: string
          format: date-time
          nullable: true
          description: Post is hidden entirely before this timestamp. Null means immediately visible.
          example: '2026-03-16T09:00:00Z'
        requiredProgress:
          type: integer
          nullable: true
          description: Minimum quest-wide battle count required to unlock content. Null means no progress gate.
          minimum: 0
          example: 500
        requiredTier:
          type: string
          enum:
            - knight
            - champion
          nullable: true
          description: Minimum contributor tier required to unlock content. Null means public access.
          example: knight
      required:
        - title
        - description
        - images
    QuestPostReorder:
      type: object
      description: Request body for reordering all posts in a quest
      properties:
        postIndexes:
          type: array
          description: Complete ordered list of existing post indexes. The backend reassigns post_index values 0, 1, 2, ... based on array order.
          items:
            type: integer
          example:
            - 3
            - 0
            - 1
            - 2
            - 4
      required:
        - postIndexes
    PublicStats:
      type: object
      description: Public statistics about the BixArena platform.
      properties:
        modelsEvaluated:
          type: integer
          format: int64
          description: Total number of unique models that have been evaluated on the platform
          example: 42
        completedBattles:
          type: integer
          format: int64
          description: Total number of completed battles on the platform
          example: 1337
        totalUsers:
          type: integer
          format: int64
          description: Total number of registered users on the platform
          example: 256
      required:
        - modelsEvaluated
        - completedBattles
        - totalUsers
    UserStats:
      type: object
      description: Statistics about a user's participation in battles.
      properties:
        totalBattles:
          type: integer
          format: int64
          description: Total number of battles the user has participated in (as arbiter)
          example: 42
        completedBattles:
          type: integer
          format: int64
          description: Number of battles that have been completed (endedAt is set)
          example: 38
        activeBattles:
          type: integer
          format: int64
          description: Number of battles currently in progress (endedAt is null)
          example: 4
        firstBattleAt:
          type: string
          format: date-time
          description: Timestamp of the user's first battle
          example: '2024-01-15T10:30:00Z'
          nullable: true
        latestBattleAt:
          type: string
          format: date-time
          description: Timestamp of the user's most recent battle
          example: '2024-10-26T14:23:00Z'
          nullable: true
        rank:
          type: integer
          format: int64
          description: |
            User's rank based on completed battles using standard competition ranking. Users with the same number of completed battles share the same rank. All users have a rank, including those with 0 completed battles.
          example: 42
      required:
        - totalBattles
        - completedBattles
        - activeBattles
        - rank
    UserInfo:
      type: object
      description: OIDC-compliant user information response
      properties:
        sub:
          type: string
          description: Subject identifier - the user UUID
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        preferred_username:
          type: string
          description: Preferred username for display
          example: john.doe
        email:
          type: string
          format: email
          description: User's email address
          example: john.doe@example.com
        email_verified:
          type: boolean
          description: Whether the email address has been verified
          example: true
        roles:
          type: array
          description: User roles assigned within BixArena
          items:
            type: string
            enum:
              - user
              - admin
          example:
            - user
        avatar_url:
          type: string
          format: uri
          maxLength: 300
          description: Profile image URL from the authentication provider
          example: https://example.com/avatar/user123.png
      required:
        - sub
  responses:
    BadRequest:
      description: Invalid request
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/BasicError'
    Unauthorized:
      description: Unauthorized
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/BasicError'
    TooManyRequests:
      description: Too many requests. Rate limit exceeded. The client should wait before making additional requests.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/RateLimitError'
      headers:
        Retry-After:
          description: Seconds to wait before making a new request
          schema:
            type: integer
            example: 18
        X-RateLimit-Limit:
          description: Maximum requests allowed per minute
          schema:
            type: integer
            example: 100
        X-RateLimit-Remaining:
          description: Remaining requests in current window
          schema:
            type: integer
            example: 0
        X-RateLimit-Reset:
          description: Seconds until rate limit window resets
          schema:
            type: integer
            example: 18
    InternalServerError:
      description: The request cannot be fulfilled due to an unexpected server error
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/BasicError'
    Forbidden:
      description: The user does not have the permission to perform this action
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/BasicError'
    NotFound:
      description: The specified resource was not found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/BasicError'
    Conflict:
      description: The request conflicts with current state of the target resource
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/BasicError'
  securitySchemes:
    jwtBearer:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Short-lived internal JWT issued by this service after authentication through Synapse or (later) an API key exchange.
  parameters:
    questId:
      name: questId
      in: path
      required: true
      schema:
        type: string
      description: Unique identifier for a quest
      example: build-bioarena-together
    battleSearchQuery:
      name: battleSearchQuery

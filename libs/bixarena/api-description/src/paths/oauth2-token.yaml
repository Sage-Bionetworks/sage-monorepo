post:
  x-anonymous-access: true
  x-rate-limit-requests-per-minute: 60
  tags:
    - Auth
  summary: Mint short-lived internal JWT
  description: >
    Exchanges an authenticated session (cookie) for an internal JWT (OAuth2-style endpoint).

    The optional audience parameter specifies the target service for the JWT.
  operationId: token
  security: []
  parameters:
    - name: audience
      in: query
      required: false
      description: >
        Target audience for the JWT. If not specified, defaults to urn:bixarena:auth.
      schema:
        type: string
  responses:
    '200':
      description: Access token response
      content:
        application/json:
          schema:
            type: object
            properties:
              access_token:
                type: string
              token_type:
                type: string
                enum:
                  - Bearer
              expires_in:
                type: integer
                description: Token lifetime in seconds
            required:
              - access_token
              - token_type
              - expires_in
    '401':
      $ref: ../components/responses/Unauthorized.yaml

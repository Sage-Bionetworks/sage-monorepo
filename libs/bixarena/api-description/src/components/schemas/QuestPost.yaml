type: object
description: A single quest post. Content fields (description, images) are null/empty when the caller does not meet unlock gates.
properties:
  postIndex:
    type: integer
    description: Display ordering index (0-based)
    minimum: 0
    example: 0
  date:
    type: string
    format: date
    nullable: true
    description: Optional display date for the post
    example: '2026-02-03'
  title:
    type: string
    description: Post heading (always visible for published posts)
    maxLength: 300
    example: 'Chapter 1: Laying the First Stones'
  description:
    type: string
    nullable: true
    description: Post content text. Null when the caller does not meet unlock gates.
    maxLength: 100000
    example: 'The arena walls began to rise...'
  images:
    type: array
    description: Image URLs for the post. Empty when the caller does not meet unlock gates.
    maxItems: 50
    items:
      type: string
      format: uri
  publishDate:
    type: string
    format: date-time
    nullable: true
    description: Post is hidden entirely before this timestamp. Null means immediately visible.
    example: '2026-03-16T09:00:00Z'
  requiredProgress:
    type: integer
    nullable: true
    description: Minimum quest-wide battle count required to unlock content. Null means no progress gate.
    minimum: 0
    example: 500
  requiredTier:
    type: string
    enum: [knight, champion]
    nullable: true
    description: Minimum contributor tier required to unlock content. Null means public access.
    example: 'knight'
  locked:
    type: boolean
    description: Whether the post content is locked for the current caller. True when the caller does not meet the required progress or tier gates. Always false for posts with no gates.
    example: false
required:
  - postIndex
  - title
  - images
  - locked

type: object
description: Request to manually categorize a battle.
properties:
  categories:
    type: array
    items:
      $ref: BiomedicalCategory.yaml
    minItems: 1
    maxItems: 3
    uniqueItems: true
  reason:
    type: string
    maxLength: 1000
    nullable: true
    description: Reason for the categorization decision
required:
  - categories

type: object
description: The result of a categorization run for an example prompt.
properties:
  id:
    type: string
    format: uuid
  promptId:
    type: string
    format: uuid
  category:
    $ref: BiomedicalCategory.yaml
    nullable: true
    description: >-
      Category assigned by this run. Null when the classifier ran successfully
      but declared no category fits (legitimate "no fit" result). Always
      non-null for human-review rows (the create request requires it).
  method:
    type: string
    maxLength: 100
  categorizedBy:
    type: string
    format: uuid
    nullable: true
    description: User ID of the categorizer. Null for AI runs.
  reason:
    type: string
    maxLength: 1000
    nullable: true
    description: Human override reason. Always null for AI runs.
  createdAt:
    type: string
    format: date-time
required:
  - id
  - promptId
  - category
  - method
  - createdAt

type: object
description: A streaming event chunk from the model chat completion
properties:
  content:
    $ref: MessageContent.yaml
  status:
    type: string
    enum:
      - streaming
      - complete
      - error
    description: Current state of the streaming response
  finishReason:
    type: string
    nullable: true
    enum:
      - stop
      - length
      - content_filter
      - error
    description: Reason the model stopped generating
  errorMessage:
    $ref: ModelErrorMessage.yaml
  usage:
    $ref: ModelChatUsage.yaml
required:
  - status

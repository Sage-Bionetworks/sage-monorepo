type: object
description: A page of leaderboard entries.
allOf:
  - $ref: PageMetadata.yaml
  - type: object
    properties:
      updatedAt:
        type: string
        format: date-time
        description: When this leaderboard was last updated
        example: '2025-08-16T14:30:00Z'
      snapshotId:
        type: string
        description: Identifier for this snapshot/timepoint
        example: 'snapshot_2025-08-16_14-30'
      priorSnapshotId:
        type: string
        nullable: true
        description: Snapshot used as the rankDelta baseline. Null when no prior snapshot was found.
        example: 'snapshot_2025-08-09_14-30'
      entryCount:
        type: integer
        description: Total models in the snapshot.
        example: 50
      voteCount:
        type: integer
        description: Total evaluations across all models in the snapshot.
        example: 9682
      entries:
        description: A list of leaderboard entries.
        type: array
        items:
          $ref: LeaderboardEntry.yaml
    required:
      - updatedAt
      - snapshotId
      - entryCount
      - voteCount
      - entries

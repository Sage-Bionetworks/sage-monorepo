type: object
description: A battle entity representing a comparison between two AI models.
properties:
  id:
    $ref: BattleId.yaml
  title:
    $ref: BattleTitle.yaml
    nullable: true
  userId:
    $ref: UserId.yaml
  model1Id:
    $ref: ModelId.yaml
  model2Id:
    $ref: ModelId.yaml
  createdAt:
    $ref: CreatedAt.yaml
  endedAt:
    $ref: EndedAt.yaml
    nullable: true
  effectiveValidationId:
    type: string
    format: uuid
    nullable: true
    description: ID of the effective battle validation (null = not yet validated)
  effectiveCategorizationId:
    type: string
    format: uuid
    nullable: true
    description: ID of the effective battle categorization (null = not yet categorized)
required:
  - id
  - userId
  - model1Id
  - model2Id
  - createdAt

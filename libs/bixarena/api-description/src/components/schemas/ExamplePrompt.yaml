type: object
description: A self-contained example prompt for biomedical question answering.
properties:
  id:
    type: string
    description: The unique identifier of the example prompt.
    example: '123e4567-e89b-12d3-a456-426614174000'
  question:
    type: string
    description: The biomedical question text.
    minLength: 1
    maxLength: 160
    example: 'What are the main symptoms of Type 2 diabetes?'
  source:
    $ref: ExamplePromptSource.yaml
  active:
    type: boolean
    description: Whether this example prompt is currently active/visible for use.
    example: true
  effectiveCategorizationId:
    type: string
    format: uuid
    nullable: true
    description: ID of the effective categorization for this prompt (null = not yet categorized)
  category:
    $ref: BiomedicalCategory.yaml
    nullable: true
    description: >-
      Category from the effective categorization. Null if not yet categorized
      or if the classifier could not assign a category.
  createdAt:
    type: string
    format: date-time
    description: When the example prompt was created.
    example: '2025-08-01T09:00:00Z'
  battleCount:
    type: integer
    minimum: 0
    description: Number of completed battles started from this prompt.
    example: 42
required:
  - id
  - question
  - source
  - active
  - battleCount
  - createdAt

type: object
description: A battle between two AI models.
properties:
  id:
    $ref: BattleId.yaml
  title:
    $ref: BattleTitle.yaml
    nullable: true
  userId:
    $ref: UserId.yaml
  model1:
    $ref: Model.yaml
  model2:
    $ref: Model.yaml
  createdAt:
    $ref: CreatedAt.yaml
  endedAt:
    $ref: EndedAt.yaml
    nullable: true
  effectiveValidationId:
    type: string
    format: uuid
    nullable: true
    description: ID of the effective battle validation (null = not yet validated)
  examplePromptId:
    type: string
    format: uuid
    nullable: true
    description: >-
      ID of the curated example prompt this battle was started from.
      Null for free-form battles.
required:
  - id
  - userId
  - model1
  - model2
  - createdAt

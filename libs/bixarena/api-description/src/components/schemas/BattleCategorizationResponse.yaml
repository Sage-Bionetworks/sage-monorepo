type: object
description: The result of a categorization run for a battle.
properties:
  id:
    type: string
    format: uuid
  battleId:
    type: string
    format: uuid
  categories:
    type: array
    items:
      $ref: BiomedicalCategory.yaml
    maxItems: 3
    description: >-
      Categories assigned by this run. Empty when the classifier ran
      successfully but declared no category fits (legitimate "no fit" result).
      Always non-empty for human-review rows (the create request requires at
      least one).
  method:
    type: string
    maxLength: 100
  categorizedBy:
    type: string
    format: uuid
    nullable: true
    description: User ID of the categorizer. Null for AI runs.
  reason:
    type: string
    maxLength: 1000
    nullable: true
    description: Human override reason. Always null for AI runs.
  createdAt:
    type: string
    format: date-time
required:
  - id
  - battleId
  - categories
  - method
  - createdAt

type: object
description: An example prompt search query with pagination and filtering options.
properties:
  pageNumber:
    description: The page number.
    type: integer
    format: int32
    default: 0
    minimum: 0
    example: 0
  pageSize:
    description: The number of items in a single page.
    type: integer
    format: int32
    default: 25
    minimum: 1
    maximum: 100
    example: 25
  sort:
    $ref: ExamplePromptSort.yaml
  direction:
    $ref: SortDirection.yaml
  source:
    $ref: ExamplePromptSource.yaml
    nullable: true
  active:
    description: |
      Filter by active status. Ignored for sort=random and sort=usage, which always return
      only active prompts.
    type: boolean
    nullable: true
    example: true
  search:
    description: Search by question content (case-insensitive partial match).
    type: string
    nullable: true
    example: 'diabetes'
  categories:
    description: Filter by one or more categories. Returns prompts matching any of the given categories.
    type: array
    items:
      $ref: BiomedicalCategory.yaml
    nullable: true
  lookback:
    $ref: Lookback.yaml
    nullable: true
required: []

type: object
description: >-
  The information used to create an example prompt. Newly created prompts are inactive
  until a reviewer publishes them via PATCH. AI auto-categorization runs asynchronously
  after creation; admins can manually override later via the categorization endpoints.
properties:
  question:
    type: string
    description: The biomedical question text.
    minLength: 1
    maxLength: 160
    example: 'What are the main symptoms of Type 2 diabetes?'
  source:
    $ref: ExamplePromptSource.yaml
required:
  - question
  - source

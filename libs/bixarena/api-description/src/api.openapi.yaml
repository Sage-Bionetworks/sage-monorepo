openapi: 3.0.3

info:
  version: 1.0.0
  title: BixArena API Service
  description: Advance bioinformatics by evaluating and ranking AI agents.
  license:
    name: Apache 2.0
    url: https://github.com/Sage-Bionetworks/sage-monorepo/blob/main/LICENSE.txt
  contact:
    name: Support
    url: https://github.com/Sage-Bionetworks/sage-monorepo

# Vendor extensions at the top level
x-oauth2-audience: 'urn:bixarena:api'

servers:
  - url: http://localhost/v1

security:
  - jwtBearer: []

tags:
  - name: Admin
    description: Administrative endpoints requiring elevated roles.
  - name: Battle
    description: Operations about battles between AI models.
  - name: Example Prompt
    description: Operations about example prompts for biomedical relevance detection.
  - name: Leaderboard
    description: Operations about leaderboards.
  - name: Model
    description: Operations about models.
  - name: Quest
    description: Operations about community quests.
  - name: Stats
    description: Public statistics about the platform.
  - name: User
    description: Operations about the authenticated user.

paths:
  /admin/quests/{questId}:
    $ref: paths/admin/quests/{questId}.yaml
  /admin/stats:
    $ref: paths/admin-stats.yaml
  /battles:
    $ref: paths/battles.yaml
  /battles/{battleId}:
    $ref: paths/battles/{battleId}.yaml
  /battles/{battleId}/rounds:
    $ref: paths/battles/{battleId}/rounds.yaml
  /battles/{battleId}/rounds/{roundId}:
    $ref: paths/battles/{battleId}/rounds/{roundId}.yaml
  /battles/{battleId}/rounds/{roundId}/stream:
    $ref: paths/battles/{battleId}/rounds/{roundId}/stream.yaml
  /example-prompts:
    $ref: paths/example-prompts.yaml
  /example-prompts/{examplePromptId}:
    $ref: paths/example-prompts/{examplePromptId}.yaml
  /example-prompts/{examplePromptId}/categorizations:
    $ref: paths/example-prompts/{examplePromptId}/categorizations.yaml
  /example-prompts/{examplePromptId}/categorizations/effective:
    $ref: paths/example-prompts/{examplePromptId}/categorizations/effective.yaml
  /example-prompts/{examplePromptId}/categorizations/run:
    $ref: paths/example-prompts/{examplePromptId}/categorizations/run.yaml
  /leaderboards:
    $ref: paths/leaderboards.yaml
  /leaderboards/{leaderboardId}:
    $ref: paths/leaderboards/{leaderboardId}.yaml
  /leaderboards/{leaderboardId}/history/{modelId}:
    $ref: paths/leaderboards/{leaderboardId}/history/{modelId}.yaml
  /leaderboards/{leaderboardId}/snapshots:
    $ref: paths/leaderboards/{leaderboardId}/snapshots.yaml
  /models:
    $ref: paths/models.yaml
  /models/{modelId}/errors:
    $ref: paths/models/{modelId}/errors.yaml
  /battles/{battleId}/evaluations:
    $ref: paths/battles/{battleId}/evaluations.yaml
  /battles/{battleId}/categorizations:
    $ref: paths/battles/{battleId}/categorizations.yaml
  /battles/{battleId}/categorizations/effective:
    $ref: paths/battles/{battleId}/categorizations/effective.yaml
  /battles/{battleId}/categorizations/run:
    $ref: paths/battles/{battleId}/categorizations/run.yaml
  /battles/{battleId}/validations:
    $ref: paths/battles/{battleId}/validations.yaml
  /battles/{battleId}/validations/effective:
    $ref: paths/battles/{battleId}/validations/effective.yaml
  /battles/{battleId}/validations/run:
    $ref: paths/battles/{battleId}/validations/run.yaml
  /quests:
    $ref: paths/quests.yaml
  /quests/{questId}:
    $ref: paths/quests/{questId}.yaml
  /quests/{questId}/contributors:
    $ref: paths/quests/{questId}/contributors.yaml
  /quests/{questId}/posts:
    $ref: paths/quests/{questId}/posts.yaml
  /quests/{questId}/posts/{postIndex}:
    $ref: paths/quests/{questId}/posts/{postIndex}.yaml
  /quests/{questId}/posts/reorder:
    $ref: paths/quests/{questId}/posts/reorder.yaml
  /stats:
    $ref: paths/stats.yaml
  /users/me/stats:
    $ref: paths/users-me-stats.yaml

components:
  securitySchemes:
    jwtBearer:
      $ref: components/securitySchemes/JwtBearer.yaml

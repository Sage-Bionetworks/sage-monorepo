<p-table
  [value]="rows()"
  class="leaderboard-table"
  [tableStyle]="{ 'min-width': '50rem' }"
  [sortField]="sortField()"
  [sortOrder]="sortOrder()"
  [customSort]="true"
  (sortFunction)="onSort($event)"
>
  <ng-template #header>
    <tr>
      <th class="col-rank" pSortableColumn="rank">Rank <p-sortIcon field="rank" /></th>
      <th class="col-model" pSortableColumn="modelId">Model <p-sortIcon field="modelId" /></th>
      <th class="col-score" pSortableColumn="btScore">Score <p-sortIcon field="btScore" /></th>
      <th class="col-ci">
        <span class="th-label">
          95% CI
          <svg
            class="info-icon"
            pTooltip="95% confidence interval from bootstrap resampling. Overlapping intervals may indicate a tie."
            tooltipPosition="top"
            width="10"
            height="10"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2.2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <circle cx="12" cy="12" r="10" />
            <path d="M12 16v-4M12 8h.01" />
          </svg>
        </span>
      </th>
      <th class="col-votes" pSortableColumn="voteCount">Votes <p-sortIcon field="voteCount" /></th>
      <th class="col-license">License</th>
    </tr>
  </ng-template>
  <ng-template #body let-row>
    <tr [class.top-three]="row.isTopThree">
      <td class="col-rank">{{ row.rank }}</td>
      <td class="col-model">
        <div class="model-cell">
          <bixarena-avatar
            class="model-logo"
            [class.is-mono]="row.orgLogoMono"
            size="sm"
            shape="bare"
            [imageUrl]="row.orgLogoUrl"
            [name]="row.modelOrganization ?? row.modelName"
          />
          <div class="model-meta">
            <a [href]="row.modelUrl" target="_blank" rel="noopener" class="model-name">
              {{ row.modelId }}
            </a>
            @if (row.modelOrganization) {
              <div class="model-org">{{ row.modelOrganization }}</div>
            }
          </div>
        </div>
      </td>
      <td class="col-score">{{ row.scoreRounded }}</td>
      <td class="col-ci">
        <div class="whisker" [title]="'[' + row.q025Rounded + ', ' + row.q975Rounded + ']'">
          <div
            class="whisker-bar"
            [style.left.%]="row.whiskerLeft"
            [style.width.%]="row.whiskerWidth"
          ></div>
          <div class="whisker-dot" [style.left.%]="row.scorePosition"></div>
        </div>
      </td>
      <td class="col-votes">{{ row.voteCount | number }}</td>
      <td class="col-license">{{ row.license | kebabToTitle }}</td>
    </tr>
  </ng-template>
  <ng-template #emptymessage>
    <tr>
      <td [attr.colspan]="columnCount" class="empty-cell">No results.</td>
    </tr>
  </ng-template>
</p-table>

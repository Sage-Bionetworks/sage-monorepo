<nav class="category-tabs" aria-label="Leaderboard categories">
  @for (category of categories(); track category.id) {
    <button
      type="button"
      class="category-tab"
      [class.active]="category.id === activeCategoryId()"
      (click)="categoryChange.emit(category.id)"
    >
      {{ category.name }}
    </button>
  }
</nav>

<div class="toolbar">
  <label class="search">
    <svg
      width="15"
      height="15"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
      aria-hidden="true"
    >
      <circle cx="11" cy="11" r="8" />
      <path d="m21 21-4.3-4.3" />
    </svg>
    <input
      type="text"
      [value]="searchTerm()"
      (input)="onSearchInput($event)"
      placeholder="Search models or organizations..."
      aria-label="Search models"
    />
  </label>
  <div class="pills" role="group" aria-label="License filter">
    <button
      type="button"
      class="pill"
      [class.active]="filters().license === 'all'"
      (click)="onLicenseChange('all')"
    >
      All
    </button>
    <button
      type="button"
      class="pill"
      [class.active]="filters().license === 'open-source'"
      (click)="onLicenseChange('open-source')"
    >
      Open Source
    </button>
    <button
      type="button"
      class="pill"
      [class.active]="filters().license === 'commercial'"
      (click)="onLicenseChange('commercial')"
    >
      Commercial
    </button>
  </div>
</div>

<section class="stats-section">
  @if (stats(); as s) {
    <div class="stats">
      <div class="stat">
        <div class="stat-val">{{ s.modelsEvaluated | number }}</div>
        <div class="stat-lbl">Models Evaluated</div>
      </div>
      <div class="stat">
        <div class="stat-val">{{ s.completedBattles | number }}</div>
        <div class="stat-lbl">Total Battles</div>
      </div>
      <div class="stat">
        <div class="stat-val">{{ s.totalUsers | number }}</div>
        <div class="stat-lbl">Total Users</div>
      </div>
    </div>
  }
  <p class="disclaimer">Only battles on biomedical topics count toward stats and rankings.</p>
</section>

@if (visible()) {
  <section class="trending-section">
    <h2 class="title">Trending this week</h2>
    <p class="subtitle">The most popular biomedical questions from the community.</p>
    <div class="grid">
      @if (showSkeletons()) {
        @for (_ of skeletonSlots; track $index) {
          <bixarena-prompt-card [question]="''" [skeleton]="true" />
        }
      } @else {
        @for (p of cards(); track p.id) {
          <bixarena-prompt-card
            [question]="p.question"
            [category]="categoryLabel(p)"
            (cardClick)="onCardClick(p)"
          />
        }
      }
    </div>
    @if (!showSkeletons()) {
      <div class="footer">
        <p-button label="Ask your own question" styleClass="ask-own-btn" (onClick)="onAskOwn()" />
      </div>
    }
  </section>
}

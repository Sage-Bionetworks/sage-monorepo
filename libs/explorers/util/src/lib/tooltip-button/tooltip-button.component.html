<p-button
  type="button"
  (click)="onClick()()"
  [attr.aria-describedby]="buttonAriaDescribedBy()"
  [pTooltip]="tooltipText()"
  (mouseenter)="showTooltip()"
  (mouseleave)="hideTooltip()"
  [autoHide]="false"
  [tooltipEvent]="'focus'"
  [tooltipPosition]="tooltipPosition()"
  [buttonProps]="buttonProps() ?? {}"
>
  @if (iconImagePath(); as path) {
    <explorers-svg-icon
      [imagePath]="path"
      [altText]="iconAltText()"
      [width]="iconWidth()"
      [height]="iconHeight()"
      [color]="iconColor()"
    />
  }
  @if (buttonLabel()) {
    {{ buttonLabel() }}
  }
</p-button>

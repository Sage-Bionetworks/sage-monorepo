<div
  class="svg-icon-tile-wrapper"
  [class.circle]="shape() === 'circle'"
  [class.square]="shape() === 'square'"
  [style.background-color]="backgroundColor()"
  [style.padding.px]="padding()"
>
  <explorers-svg-icon
    [imagePath]="imagePath()"
    [altText]="altText()"
    [width]="width()"
    [height]="height()"
    [color]="color()"
  />
</div>

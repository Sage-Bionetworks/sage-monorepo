<p-table
  ngSkipHydration
  #headerTable
  id="table-header"
  breakpoint="0"
  showGridlines
  [customSort]="true"
  (sortFunction)="sortCallback($event)"
  sortMode="multiple"
  [multiSortMeta]="multiSortMeta()"
  [defaultSortOrder]="-1"
>
  <ng-template pTemplate="header">
    <tr>
      @for (column of selectedColumns(); track column) {
        <th
          [id]="column.name"
          [class]="column.type"
          [attr.data-column-key]="column.data_key"
          [pSortableColumn]="column.data_key"
          [style]="{ width: columnWidths()[column.data_key] || 'auto' }"
        >
          <div [class]="COLUMN_HEADER_CLASS">
            <div [class]="COLUMN_HEADER_TEXT_CLASS">
              <span [pTooltip]="column.tooltip" tooltipPosition="top">
                {{ column.name }}
              </span>
            </div>
            <div class="column-header-sort">
              <p-sortIcon
                [field]="column.data_key"
                [pTooltip]="column.sort_tooltip"
                tooltipPosition="top"
              />
            </div>
          </div>
        </th>
      }
    </tr>
  </ng-template>
</p-table>

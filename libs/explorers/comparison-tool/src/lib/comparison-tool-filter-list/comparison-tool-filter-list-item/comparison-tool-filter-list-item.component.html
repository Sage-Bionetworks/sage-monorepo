@if (isVisible()) {
  <div class="filter-list-item-wrapper">
    <explorers-chiclet
      [removable]="true"
      fontSize="12px"
      closeIconColor="var(--color-action-primary)"
      [closeIconSize]="9"
      [removeAriaLabel]="'Clear ' + (description() || title())"
      (removed)="clearWasClicked()"
    >
      @if (title() !== '') {
        <b>{{ title() }}:&nbsp;</b>
      }
      @if (description() !== '') {
        <span>{{ description() }}</span>
      }
    </explorers-chiclet>
  </div>
}

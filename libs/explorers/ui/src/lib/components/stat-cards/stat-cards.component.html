<div
  class="stat-cards"
  [class.stat-cards-prepare-animation]="animateOnLoad() && !hydrated()"
  [class.stat-cards-animate-on-load]="animateOnLoad() && hydrated()"
>
  @for (card of cards(); track $index) {
    <explorers-stat-card
      [header]="card.header"
      [subHeader]="card.subHeader"
      [iconPath]="card.iconPath"
      [iconAltText]="card.iconAltText"
      [iconBackgroundColor]="card.iconBackgroundColor"
      [iconColor]="card.iconColor"
      [link]="card.link"
    />
  }
</div>

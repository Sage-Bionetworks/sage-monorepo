<div class="stat-card">
  <div class="stat-card-icon">
    <explorers-svg-icon
      [imagePath]="iconPath()"
      [altText]="iconAltText()"
      [width]="72"
      [height]="72"
      [enableHoverEffects]="false"
    />
  </div>
  <div class="stat-card-header">{{ header() }}</div>
  @if (subHeader()) {
    <div class="stat-card-sub-header">{{ subHeader() }}</div>
  }
</div>

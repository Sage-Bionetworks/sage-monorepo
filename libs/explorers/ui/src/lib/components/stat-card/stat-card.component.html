<div class="stat-card">
  <div
    class="stat-card-icon"
    [class.stat-card-icon-circle]="iconBackgroundColor()"
    [style.background-color]="iconBackgroundColor()"
  >
    <explorers-svg-icon
      [imagePath]="iconPath()"
      [altText]="iconAltText()"
      [width]="40"
      [height]="40"
      [enableHoverEffects]="false"
      [color]="iconColor() ?? 'inherit'"
    />
  </div>
  <div class="stat-card-header">{{ header() }}</div>
  @if (subHeader()) {
    <div class="stat-card-sub-header">{{ subHeader() }}</div>
  }
</div>

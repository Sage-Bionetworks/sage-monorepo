<div class="team-card">
  <div class="team-card-textbox">
    <h2 class="team-card-title">{{ title() }}</h2>
    <p class="team-card-description">{{ description() }}</p>
  </div>
  <div class="team-card-members">
    @for (member of sortedMembers(); track $index) {
      <div class="team-member">
        <div
          class="team-member-image"
          [style.background-image]="'url(' + placeholderImagePath + ')'"
        >
          @if (images()[member.name]) {
            <img [src]="images()[member.name]" [alt]="member.name" />
          }
        </div>
        <div class="team-member-info">
          <span class="team-member-name">
            @if (member.url) {
              <a href="{{ member.url }}">{{ member.name }}</a>
            } @else {
              {{ member.name }}
            }
          </span>
          @if (member.isprimaryinvestigator) {
            <span class="team-member-role">Primary Investigator</span>
          }
        </div>
      </div>
    }
  </div>
</div>

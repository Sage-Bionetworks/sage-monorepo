<div class="gct-filter-list">
  @if (shouldShowList()) {
    <div class="gct-filter-list-inner">
      <div>
        <button class="gct-filter-list-clear-all" (click)="clearList()">
          <explorers-svg-icon
            imagePath="explorers-assets/icons/trash.svg"
            [width]="10"
            [height]="12"
            [color]="'#aeb5bc'"
            altText="trash"
          ></explorers-svg-icon>
          <span>Clear all</span>
        </button>
      </div>
      <div>
        @if (significanceThresholdActive) {
          <explorers-filter-chiclet
            [value]="'Significance &leq; ' + significanceThreshold"
            (cleared)="removeSignificanceThresholdFilter()"
          ></explorers-filter-chiclet>
        }
        @for (filter of filters; track $index) {
          @for (option of filter.options; track $index) {
            @if (option.selected) {
              <explorers-filter-chiclet
                [name]="filter.short || ''"
                [value]="option.label"
                (cleared)="clearSelectedFilters(option)"
              ></explorers-filter-chiclet>
            }
          }
        }
      </div>
    </div>
  }
</div>

<div [class]="{ 'drug-details': true, loading: isLoading }">
  @if (isLoading) {
    <div id="loading">
      <explorers-loading-icon />
    </div>
  } @else if (drug) {
    <agora-drug-details-hero [drug]="drug" />
    <explorers-panel-navigation
      [panels]="panels"
      (panelChange)="onPanelChange($event)"
      [activePanel]="activePanel"
      [activeParent]="activeParent"
      [scrollToPanelNavElementOnInitialLoad]="scrollToPanelNavElementOnInitialLoad"
    />
    <div class="panel-content">
      @switch (activePanel) {
        @case ('summary') {
          <!-- TODO -->
        }
        @case ('resources') {
          <agora-drug-details-resources [drug]="drug" />
        }
        @case ('nominationDetails') {
          <!-- TODO -->
        }
      }
    </div>
  }
</div>
